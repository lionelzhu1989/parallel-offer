function startGame() {
  var track = CAREER_TRACKS[_selectedTrack];
  if (!track) return;
  state.track = _selectedTrack;
  state.year = 1;
  state.salary = track.salary;
  state.rankIdx = 0;
  state.skill = 30;
  state.network = 20;
  state.health = 80;
  state.hair = 60;
  state.money = 0;
  state.talents = _talentSelections.slice();
  state.persona = Object.assign({}, _personaSelections);
  state._shownEvents = {};
  state._shownRandom = []; state._recentEventTitles = [];
  state._yearlyRecords = [];
  state._playEnded = false;
  state._endingSaved = false;
  state._promoCooldown = 0;
  state._undoSnapshot = null;
  state._undoUsed = 0;
  state._undoMax = 3;
  state._lastChoiceType = null;
  state._playStartTime = Date.now();

  // Apply persona bonuses
  var bg = window._personaDims[1].options.find(function(o){ return o.id === _personaSelections.background; });
  var city = window._personaDims[2].options.find(function(o){ return o.id === _personaSelections.city; });
  var pers = window._personaDims[0].options.find(function(o){ return o.id === _personaSelections.personality; });
  if (bg) state.money = bg.startMoney;
  if (city) {
    state.salary = Math.round(state.salary * city.salaryMod);
    state.expense = Math.round((track.expense || 5000) * (city.expenseMod || 1));
  } else {
    state.expense = track.expense || 5000;
  }
  if (pers) {
    state.salary = Math.round(state.salary * pers.salaryMod);
    state.skill = Math.round(state.skill * pers.skillMod);
  }

  // Apply talent effects
  for (var i = 0; i < state.talents.length; i++) {
    var talent = TALENT_POOL.find(function(t){ return t.id === state.talents[i]; });
    if (talent && talent.effect) {
      if (talent.talentEffect && talent.talentEffect.healthPenalty) state.health += talent.talentEffect.healthPenalty;
      if (talent.talentEffect && talent.talentEffect.hairBonus) state.hair += talent.talentEffect.hairBonus;
    }
  }
  state.health = clamp(state.health, 0, 100);
  state.hair = clamp(state.hair, 0, 100);

  updateTopBar();
  render();
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);

}

function chooseEvent(optIdx) {
  if (!debounce('event', 400)) return;
  var event = window._currentEvent;
  if (!event) return;
  var opt = event.opts[optIdx];

  // Save snapshot for undo
  state._undoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    hair: state.hair, money: state.money, salary: state.salary,
    rankIdx: state.rankIdx, year: state.year, eventTitle: event.title,
    promoCooldown: state._promoCooldown || 0
  };
  state._lastChoiceType = 'event';

  // P1: Track key decisions for chain events
  if (!state._keyDecisions) state._keyDecisions = [];
  var _kd = null;
  if (event.title === '跳槽机会' || event.title === '跳槽邀请') _kd = 'switched_job';
  else if (event.title === '学AI' || event.title === 'AI替代焦虑') _kd = 'learned_ai';
  else if (event.title === '得罪领导' || event.title === '顶撞上司') _kd = 'offended_boss';
  else if (event.title === '创业邀约' || event.title === '辞职创业') _kd = 'chose_startup';
  else if (event.title === '灰色收入' || event.title === '行贿诱惑') _kd = 'took_bribe';
  else if (event.title === '转管理' || event.title === '团队管理') _kd = 'went_management';
  if (_kd && state._keyDecisions.indexOf(_kd) < 0) state._keyDecisions.push(_kd);

  // Snapshot before effects (for year review)
  var _before = {skill:state.skill, network:state.network, health:state.health, hair:state.hair, money:state.money, salary:state.salary};

  // Apply effects (merged: health→hair, network→skill)
  if (opt.skill) state.skill = clamp(state.skill + getModifiedBonus(opt.skill, 'skill'), 0, 100);
  if (opt.network) state.skill = clamp(state.skill + getModifiedBonus(opt.network, 'network'), 0, 100);
  if (opt.health) state.hair = clamp(state.hair + getModifiedBonus(opt.health, 'health'), 0, 100);
  if (opt.hair) state.hair = clamp(state.hair + getModifiedBonus(opt.hair, 'hair'), 0, 100);
  if (opt.money) {
    state.money += opt.money;
    // Money floor: bankruptcy at -50000
    if (state.money < -50000) { state.money = -50000; toast('💸 负债累累！信用破产了...'); }
    if (state.money >= 1000000) { toast('🏆 千万存款！财务自由指日可待！'); }
  }
  if (opt.salary) state.salary = Math.max(0, Math.round(state.salary * (1 + opt.salary * 0.1)));


  // Spawn floating numbers for value changes
  var _floatChanges = {};
  if (opt.skill || opt.network) _floatChanges.charm = (opt.skill||0) + (opt.network||0) + (state.talents.indexOf('chosen') >= 0 ? 1 : 0);
  if (opt.health || opt.hair) _floatChanges.hairDisplay = (opt.health||0) + (opt.hair||0) + (state.talents.indexOf('runner') >= 0 ? 3 : 0);
  if (opt.money) _floatChanges.money = opt.money;
  spawnFloatingNumbers(_floatChanges);

  applyYearlyEffects();
  applyBuffs();
  applyYearlyIncome();
  if (state.talents.indexOf('foodie') >= 0) state.hair += 3;
  // runner: health recovery + cap boost
  if (state.talents.indexOf('runner') >= 0) state.hair = clamp(state.hair + 3, 0, 100);
  // lucky: small random bonus to any event
  if (state.talents.indexOf('lucky') >= 0) { var lb = randInt(1,5); state.hair += lb; }
  // gambler: money outcomes amplified
  if (state.talents.indexOf('gambler') >= 0 && opt.money) { state.money += Math.round(opt.money * 0.3); }
  // chosen: extra skill from every event
  if (state.talents.indexOf('chosen') >= 0) state.skill += 1;
  // artsy: side income boost
  if (state.talents.indexOf('artsy') >= 0 && opt.money > 0) state.money += Math.round(opt.money * 0.15);
  // drama: extra hair growth from happy events
  if (state.talents.indexOf('drama') >= 0 && opt.hair > 0) state.hair += 2;
  // indecisive: slightly reduce negative effects
  if (state.talents.indexOf('indecisive') >= 0) {
    if (opt.health && opt.health < 0) state.hair -= Math.round(opt.health * 0.5);
    if (opt.hair && opt.hair < 0) state.hair -= Math.round(opt.hair * 0.5);
  }
  // phone: chance of random phone distraction event (skill penalty)
  if (state.talents.indexOf('phone') >= 0 && Math.random() < 0.15) state.skill -= 1;

    // healthCap removed (health merged into hair)
  state.health = clamp(state.health, 0, 100);
  state.hair = clamp(state.hair, 0, 100);
  state.skill = clamp(state.skill, 0, 100);
  state.network = clamp(state.network, 0, 100);
  state.salary = Math.max(0, state.salary);

  // Record year
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    hair: state.hair,
    money: state.money,
    event: event.title
  });
  }

  // P0: Show year review overlay
  showYearReview(event, opt, _before);

  // Apply option buff/debuff
  if (opt.__buff) {
    var b = opt.__buff;
    addBuff(b.id, b.name, b.desc, b.dur, b.fx);
  }
}

// ====== Unified yearly health/talent effects ======
function applyYearlyEffects() {
  // === Health degradation ===
  var healthDecay = (state.year >= 5 ? 4 : 2);
  if (state.talents.indexOf('hardwork') >= 0) healthDecay += 3;
  if (state.talents.indexOf('nightowl') >= 0) healthDecay += 1;
  // Sub-health: health decays faster
  if (state.health <= 50 && state.health > 0) healthDecay += 2;
  state.health -= healthDecay;
  state.health = clamp(state.health, 0, 100);
  state.hair = clamp(state.hair, 0, 100);
  state.health = clamp(state.health, 0, state._healthMax || 100);

  // === Hair degradation (stress) ===
  var hairDecay = 2;
  if (state.health <= 30) hairDecay += 3; // sick = more hair loss
  if (state.salary > 30000) hairDecay += 1; // high salary = more stress
  state.hair -= hairDecay;
  state.hair = clamp(state.hair, 0, 100);

  // === Three-body linkage: Health → Income ===
  if (state.health <= 20) {
    // Very sick: salary takes a hit
    state.salary = Math.max(0, Math.round(state.salary * 0.7));
  } else if (state.health <= 50) {
    // Sub-health: mild salary reduction
    state.salary = Math.max(0, Math.round(state.salary * 0.9));
  }

  // === Three-body linkage: Hair → Spending ===
  if (state.hair <= 15 && state.money >= 20000) {
    // Balding crisis: forced transplant spending
    state.money -= 5000;
    state.hair = clamp(state.hair + 8, 0, 100);
    state.health -= 5; // transplant is tiring
    toast('💇 被迫植发！花费¥5000，发量-5');
  }

  // Hospitalization trigger
  if (state.health <= 0 && !state._isHospitalized) { state._isHospitalized = true; state._hospitalYear = state.year; }

  // Apply talent debuffs (yearlyEffect)
  for (var ti = 0; ti < (state.talents || []).length; ti++) {
    var talentDef = TALENT_POOL.find(function(t) { return t.id === state.talents[ti]; });
    if (talentDef && talentDef.yearlyEffect) {
      try { talentDef.yearlyEffect(state); } catch(e) {}
    }
  }
}
function getModifiedBonus(base, type) {
  var mod = 1;
  for (var i = 0; i < state.talents.length; i++) {
    var talent = TALENT_POOL.find(function(t){ return t.id === state.talents[i]; });
    if (!talent || !talent.effect) continue;
    if (type === 'skill' && talent.talentEffect && talent.talentEffect.skillBonus) mod += talent.talentEffect.skillBonus;
    if (type === 'skill' && talent.talentEffect && talent.talentEffect.skillPenalty) mod += talent.talentEffect.skillPenalty;
    if (type === 'network' && talent.talentEffect && talent.talentEffect.networkBonus) mod += talent.talentEffect.networkBonus;
    if (type === 'network' && talent.talentEffect && talent.talentEffect.networkPenalty) mod += talent.talentEffect.networkPenalty;
  }
  return Math.round(base * Math.max(0, mod));
}


// ====== Undo/Regret System ======
function undoLastChoice() {
  if (!state._undoSnapshot) { toast('没有可以撤回的选择'); return; }
  if (state._undoUsed >= state._undoMax) { toast('💊 后悔药已用完（本局' + state._undoMax + '次）'); return; }
  var snap = state._undoSnapshot;
  state.skill = snap.skill;
  state.network = snap.network;
  state.health = snap.health;
  state.hair = snap.hair;
  state.money = snap.money;
  state.salary = snap.salary;
  state.rankIdx = snap.rankIdx;
  state.year = snap.year;
  state._promoCooldown = snap.promoCooldown || 0;
  var wasRandom = state._lastChoiceType === 'random';
  // Keep event in dedup (prevent re-rolling)
  // Just re-show the same event without removing from shown list
  state._undoSnapshot = null;
  state._lastChoiceType = null;
  // Re-show the same event
  if (wasRandom) {
    showRandomEvent();
  } else {
    render();
  }
  state._undoUsed++;
  var remain = state._undoMax - state._undoUsed;
  toast('↩️ 已撤回（剩余' + remain + '次）');
}


// ====== Adaptive Event Scoring ======
// Scores how relevant/dramatic an event is given current state
function _scoreEvent(event, state) {
  var score = 0;
  var hair = state.hair || 50;
  var skill = state.skill || 30;
  var network = state.network || 30;
  var health = state.health || 60;
  var money = state.money || 5000;
  var year = state.year || 1;
  var title = event.title || '';
  var desc = event.desc || '';
  var text = title + ' ' + desc;
  
  // Dramatic tension: events that create contrast with current state
  // Low hair → hair-related events are funnier/more dramatic
  if (hair < 30 && (text.includes('发') || text.includes('头发') || text.includes('理发') || text.includes('植发'))) score += 15;
  if (hair > 70 && (text.includes('发型') || text.includes('烫发') || text.includes('留长'))) score += 8;
  
  // High skill → tech challenges are more interesting
  if (skill > 60 && (text.includes('Code') || text.includes('Bug') || text.includes('架构') || text.includes('技术'))) score += 10;
  if (skill < 30 && (text.includes('学') || text.includes('培训') || text.includes('AI'))) score += 8;
  
  // High network → social events matter more
  if (network > 60 && (text.includes('聚会') || text.includes('同学') || text.includes('团建') || text.includes('社交'))) score += 10;
  if (network > 50 && (text.includes('创业') || text.includes('被挖'))) score += 8;
  
  // Low health → health events are dramatic
  if (health < 35 && (text.includes('病') || text.includes('体检') || text.includes('失眠') || text.includes('猝'))) score += 15;
  if (health > 70 && (text.includes('健身') || text.includes('运动'))) score += 5;
  
  // Money situation
  if (money < 1000 && (text.includes('奖金') || text.includes('意外') || text.includes('中奖'))) score += 12;
  if (money > 20000 && (text.includes('投资') || text.includes('炒股') || text.includes('暴雷'))) score += 10;
  
  // Year-based drama
  if (year <= 2 && (text.includes('第一次') || text.includes('入职') || text.includes('新人'))) score += 8;
  if (year >= 8 && (text.includes('35') || text.includes('十年') || text.includes('资深'))) score += 10;
  
  // Chain event bonus: if previous decision set up this event
  if (state._keyDecisions && state._keyDecisions.length > 0) {
    if (state._keyDecisions.indexOf('learned_ai') >= 0 && text.includes('AI')) score += 12;
    if (state._keyDecisions.indexOf('offended_boss') >= 0 && text.includes('领导')) score += 10;
    if (state._keyDecisions.indexOf('switched_job') >= 0 && text.includes('新公司')) score += 10;
    if (state._keyDecisions.indexOf('chose_startup') >= 0 && text.includes('创业')) score += 12;
  }
  
  // Recency penalty: events shown recently get penalized
  if (state._recentEventTitles && state._recentEventTitles.indexOf(title) >= 0) score -= 20;
  
  // Random jitter for variety
  score += Math.random() * 6;
  
  return score;
}

// Pick best event from pool using adaptive scoring
function _pickAdaptiveEvent(pool, state) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return pool[0];
  
  var best = null;
  var bestScore = -Infinity;
  
  for (var i = 0; i < pool.length; i++) {
    var s = _scoreEvent(pool[i], state);
    if (s > bestScore) {
      bestScore = s;
      best = pool[i];
    }
  }
  
  return best || pool[0];
}

// ====== Random Event ======
function showRandomEvent() {
  var pool = [];
  for (var i = 0; i < RANDOM_EVENTS.length; i++) {

    var _rh = getModifiedBonus(opt.health||0,'health')+getModifiedBonus(opt.hair||0,'hair'); if(_rh) parts.push('<span class="' + (_rh > 0 ? 'eff-pos' : 'eff-neg') + '">😊' + (_rh > 0 ? '+' : '') + Math.round(_rh) + '</span>');

  document.getElementById('mainContent').innerHTML = html;
}

// ====== Promotion Challenge ======
function showPromotionChallenge() {
  // Save pre-promotion snapshot for undo
  state._prePromoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    hair: state.hair, salary: state.salary, rankIdx: state.rankIdx,
    money: state.money, year: state.year, track: state.track
  };

  var track = CAREER_TRACKS[state.track];
  var currentRank = track.ladder[state.rankIdx];
  var nextRank = track.ladder[state.rankIdx + 1];
  var main = document.getElementById('mainContent');

  // Calculate thresholds
  var skillReq = 30 + state.rankIdx * 12;
  var networkReq = 20 + state.rankIdx * 10;

  // Calculate talent modifier
  var talentMod = 0;
  var talentDetails = [];
  for (var i = 0; i < state.talents.length; i++) {
    var t = TALENT_POOL.find(function(tal){ return tal.id === state.talents[i]; });
    if (t && t.effect) {
      if (t.promoBonus) { talentMod += t.promoBonus; talentDetails.push({name:t.emoji+' '+t.name, val:t.promoBonus}); }
      if (t.promoPenalty) { talentMod += t.promoPenalty; talentDetails.push({name:t.emoji+' '+t.name, val:t.promoPenalty}); }
      if (t.talentEffect && t.talentEffect.skillBonus && state.skill >= skillReq) { talentMod += 0.03; talentDetails.push({name:t.emoji+' '+t.name+'(技能加成)', val:0.03}); }
    }
  }

  // Calculate effective chance (linked to thresholds)
  var chance = 0.15; // base
  var skillMet = state.skill >= skillReq;
  var networkMet = state.network >= networkReq;
  if (skillMet) chance += 0.15;
  if (networkMet) chance += 0.10;
  if (skillMet && networkMet) chance += 0.05; // both met bonus
  // Beyond thresholds bonus
  if (state.skill > skillReq) chance += Math.min((state.skill - skillReq) / 300, 0.1);
  if (state.network > networkReq) chance += Math.min((state.network - networkReq) / 400, 0.05);
  // Talent modifier
  chance += talentMod;
  chance = Math.max(0.05, Math.min(0.85, chance));

  // Store for promoChoice to use
  state._promoChance = chance;
  state._promoSkillReq = skillReq;
  state._promoNetworkReq = networkReq;

  var html = '<div class="scenario-card promo-card">';
  html += '<div class="promo-badge">🎯 晋升答辩</div>';
  html += '<div class="scene-text">';
  html += '第' + state.year + '年，你迎来了从 <strong>' + currentRank + '</strong> 晋升到 <strong>' + nextRank + '</strong> 的机会。';
  html += '<br><br>你需要在三选一中做出决定：';
  html += '</div></div>';
  html += '<div class="choices">';
  html += '<button class="choice-btn" onclick="promoChoice(0)">';
  html += '🎯 拼一把冲晋升';
  html += '<div class="choice-effect">成功概率 ' + Math.round(chance * 100) + '% · 高风险高回报</div></button>';
  html += '<button class="choice-btn" onclick="promoChoice(1)">';
  html += '🛡️ 稳住别浪';
  html += '<div class="choice-effect">安全但错过机会</div></button>';
  html += '<button class="choice-btn" onclick="promoChoice(2)">';
  html += '🔄 骑驴找马';
  html += '<div class="choice-effect">跳槽涨薪但职级可能重置</div></button>';
  html += '</div>';

  // Threshold + talent breakdown panel
  html += '<div style="text-align:center;margin-top:12px;padding:12px 16px;background:#f5f0e3;border-radius:12px;font-size:13px">';
  html += '<div style="margin-bottom:8px;font-weight:600">📋 晋升门槛 & 加成</div>';
  html += '<div style="margin-bottom:4px">需要 <span style="color:' + (skillMet ? '#2e7d32' : '#c62828') + ';font-weight:600">🧠' + skillReq + '</span>';
  html += ' & <span style="color:' + (networkMet ? '#2e7d32' : '#c62828') + ';font-weight:600">👥' + networkReq + '</span>';
  html += ' <span style="color:#999;font-size:11px">(你: 🧠' + state.skill + ' 👥' + state.network + ')</span></div>';

  if (talentDetails.length > 0) {
    html += '<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #d4c9a8">';
    html += '<span style="color:#6b5b3e">🎭 天赋加成：</span>';
    for (var j = 0; j < talentDetails.length; j++) {
      var td = talentDetails[j];
      html += '<span style="color:' + (td.val > 0 ? '#2e7d32' : '#c62828') + '">' + td.name + ' ' + (td.val > 0 ? '+' : '') + Math.round(td.val * 100) + '%</span>';
      if (j < talentDetails.length - 1) html += ' ';
    }
    html += '</div>';
  }

  html += '<div style="margin-top:8px;padding-top:6px;border-top:1px dashed #d4c9a8;font-weight:600">';
  html += '🎲 晋升概率：<span style="color:#ff6b35;font-size:15px">' + Math.round(chance * 100) + '%</span>';
  html += '</div></div>';

  html += '<div class="undo-bar"><button class="undo-btn" onclick="undoLastChoice()">↩️ 后悔药 · 撤回重选 (' + (state._undoMax - state._undoUsed) + '/' + state._undoMax + ')</button></div>';

function promoChoice(choice) {
  if (!debounce('promo', 400)) return;
  // Save snapshot for undo (fix #7)
  state._undoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    hair: state.hair, money: state.money, salary: state.salary,
    rankIdx: state.rankIdx, year: state.year, eventTitle: '晋升答辩',
    promoCooldown: state._promoCooldown || 0
  };
  state._lastChoiceType = 'promo';
  var track = CAREER_TRACKS[state.track];
  var promoted = false;
  var talentMod = 0;
  for (var i = 0; i < state.talents.length; i++) {
    var t = TALENT_POOL.find(function(tal){ return tal.id === state.talents[i]; });
    if (t && t.promoBonus) talentMod += t.promoBonus;
    if (t && t.promoPenalty) talentMod += t.promoPenalty;
  }

  if (choice === 0) {
    // Push for promotion: use pre-calculated threshold-linked chance
    var chance = state._promoChance || 0.3;
    promoted = Math.random() < chance;
    if (promoted) {
      state.rankIdx = Math.min(state.rankIdx + 1, track.ladder.length - 1);
      state.skill = clamp(state.skill + 10, 0, 100);
      state.health = clamp(state.health - 8, 0, 100);
      state.hair = clamp(state.hair + 10, 0, 100);
      toast('🎉 晋升成功！现在是 ' + track.ladder[state.rankIdx]);
      state.salary = Math.round(state.salary * 1.3);
    } else {
      state.hair = clamp(state.hair - 10, 0, 100);
      state._promoCooldown = 2;
      toast('😔 晋升失败');
    // Restore from snapshot on failure
    if (state._prePromoSnapshot) {
      var snap = state._prePromoSnapshot;
      state.skill = snap.skill; state.network = snap.network;
      state.health = snap.health; state.hair = snap.hair;
      state.money = snap.money;
      state._prePromoSnapshot = null;
    }
    }
  } else if (choice === 1) {
    // Stay safe: slight skill bonus, no promotion
    state.skill = clamp(state.skill + 3, 0, 100);
    state.health = clamp(state.health + 3, 0, 100);
    state.hair = clamp(state.hair + 2, 0, 100);
    toast('🛡️ 稳住，等待下次机会');
  } else {
    // Job hop: salary boost but rank may reset
    state.salary = Math.round(state.salary * 1.25);
    state.network = clamp(state.network + 10, 0, 100);
    state.hair = clamp(state.hair + 5, 0, 100);
    if (Math.random() < 0.4) {
      state.rankIdx = Math.max(0, state.rankIdx - 1);
      toast('🔄 跳槽了！薪资涨了，但职级重置...');
    } else {
      toast('🔄 跳槽成功！薪资涨了！');
    }
  }

  // Record year for timeline
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    hair: state.hair,
    money: state.money,
    event: '晋升答辩'
  });
  }

    applyYearlyEffects();
  applyBuffs();
  applyYearlyIncome();
  state.year++;
  render();
}

  else if (s.skill >= 85) animal = '🧠 技术猫头鹰';

  else if (s.hair >= 80) animal = '😺 发量喵';
  else if (s.hair <= 40) animal = '🦘 逃命袋鼠';

  return { traits: traits, animal: animal };
}

function renderTimeline() {
  var c = document.getElementById('tlTrack');
  if (!c || !state._yearlyRecords || state._yearlyRecords.length === 0) return;
  var records = state._yearlyRecords;
  var maxMoney = 0;
  for (var i = 0; i < records.length; i++) { if (records[i].money > maxMoney) maxMoney = records[i].money; }
  if (maxMoney <= 0) maxMoney = 100000;

  var html = '';
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var prev = i > 0 ? records[i-1] : null;

    // Determine dot style
    var dotCls = 'tl-dot';
    if (r.event && (r.event.indexOf('晋升') >= 0 || r.event.indexOf('升职') >= 0 || r.event.indexOf('主管') >= 0 || r.event.indexOf('总监') >= 0 || r.event.indexOf('VP') >= 0)) dotCls += ' promo';
    else if (r.event && (r.event.indexOf('裁员') >= 0 || r.event.indexOf('辞职') >= 0 || r.event.indexOf('离职') >= 0 || r.event.indexOf('创业') >= 0)) dotCls += ' fire';
    else if (r.event && (r.event.indexOf('结婚') >= 0 || r.event.indexOf('买房') >= 0 || r.event.indexOf('财务') >= 0 || r.event.indexOf('百万') >= 0)) dotCls += ' gold';

    html += '<div class="tl-year">';
    html += '<div class="' + dotCls + '"></div>';
    html += '<div class="tl-content">';
    html += '<div class="tl-year-row"><span class="tl-year-label">第' + r.year + '年</span>';
    html += '<span class="tl-event">' + (r.event || '平稳度过') + '</span>';
    html += '<span class="tl-rank">' + r.rank + '</span></div>';

    // Stat changes as compact pills
    html += '<div class="tl-stats">';
    if (prev) {
      var diffs = [
        ['🧠', r.skill - prev.skill], ['👥', r.network - prev.network],
        ['\u2764\uFE0F', r.health - prev.health], ['😊', r.hair - prev.hair]
      ];
      for (var d = 0; d < diffs.length; d++) {
        if (diffs[d][1] !== 0) {
          var cls = diffs[d][1] > 0 ? 'pos' : 'neg';
          var sign = diffs[d][1] > 0 ? '+' : '';
          html += '<span class="tl-stat"><span class="' + cls + '">' + diffs[d][0] + sign + diffs[d][1] + '</span></span>';
        }
      }
    }
    var mc = r.money < 0 ? '#ef4444' : r.money >= 200000 ? '#10b981' : r.money >= 50000 ? '#f59e0b' : '';
    var ms = r.money >= 10000 ? (r.money/10000).toFixed(1) + 'w' : r.money.toLocaleString();
    html += '<span class="tl-stat" style="' + (mc ? 'color:'+mc+';font-weight:700' : '') + '">\uD83D\uDCB0' + ms + '</span>';
    html += '</div></div></div>';
  }

  c.innerHTML = html;
}

// ====== Buff/Debuff System ======
function addBuff(id, name, desc, duration, effects) {
  // effects: {skill:0, network:0, health:0, hair:0, salary:0, money:0} per year
  // Remove existing buff with same id
  state._buffs = state._buffs.filter(function(b) { return b.id !== id; });
  state._buffs.push({id:id, name:name, desc:desc, remaining:duration, effects:effects});
}

function applyBuffs() {
  // Called yearly - apply all active buff effects and decrement duration
  var expired = [];
  for (var i = state._buffs.length - 1; i >= 0; i--) {
    var b = state._buffs[i];
    var e = b.effects;
    if (e.skill) state.skill = clamp(state.skill + e.skill, 0, 100);
    if (e.network) state.network = clamp(state.network + e.network, 0, 100);
    if (e.health) state.health = clamp(state.health + e.health, 0, 100);
    if (e.hair) state.hair = clamp(state.hair + e.hair, 0, 100);
    if (e.salary) state.salary = Math.max(0, state.salary + e.salary);
    if (e.money) state.money += e.money;
    b.remaining--;
    if (b.remaining <= 0) expired.push(b.name);
  }
  state._buffs = state._buffs.filter(function(b) { return b.remaining > 0; });
  if (expired.length > 0) toast('📋 ' + expired.join('、') + ' 效果结束');
}

function getBuffDesc() {
  if (state._buffs.length === 0) return '';
  var html = '';
  for (var i = 0; i < state._buffs.length; i++) {
    var b = state._buffs[i];
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px">⏱ ' + b.name + ' (' + b.remaining + '年)</div>';
  }
  return html;
}

function buyInvest(cost, rate) {
  if (!debounce('shop', 300)) return;
  if (state.money < cost) { toast('💸 存款不足'); return; }
  state.money -= cost;
  var rateMap = {0.03:'定期存款', 0.08:'基金定投', 0.15:'股票炒股'};
  var invName = rateMap[rate] || '理财';
  state._investments.push({principal:cost, rate:rate, name:invName, year:state.year});
  toast('✅ 已投入 ' + (cost/10000).toFixed(0) + '万，年化' + (rate*100).toFixed(0) + '%，每年自动复利');
  closeAllModals();
  render();
}

function sellInvest(idx) {
  if (!debounce('shop', 300)) return;
  if (!state._investments || idx >= state._investments.length) return;
  var inv = state._investments[idx];
  // Calculate years held
  var yearsHeld = Math.max(1, state.year - inv.year);
  // Penalty: lose 10% of principal if sold early (within 3 years)
  var penalty = yearsHeld < 3 ? 0.1 : 0;
  var returnMoney = Math.round(inv.principal * (1 - penalty));
  state.money += returnMoney;
  state._investments.splice(idx, 1);
  if (penalty > 0) {
    toast('💸 赎回' + inv.name + '，持有' + yearsHeld + '年，手续费' + (penalty*100) + '%，到账¥' + (returnMoney/10000).toFixed(1) + '万');
  } else {
    toast('✅ 赎回' + inv.name + '，持有' + yearsHeld + '年，全额到账¥' + (returnMoney/10000).toFixed(1) + '万');
  }
  closeAllModals();
  render();
}

function buyProperty(cost, rent) {
  if (!debounce('shop', 300)) return;
  if (state.money < cost) { toast('💸 存款不足，需¥' + (cost/10000) + '万'); return; }
  state.money -= cost;
  state._property = (state._property || 0) + 1;
  state._yearlyRent = (state._yearlyRent || 0) + rent;
  toast('🏠 购房成功！每年租金+¥' + (rent/10000).toFixed(1) + '万');

function applyYearlyIncome() {
  // Apply rental income
  if (state._yearlyRent > 0) {
    state.money += state._yearlyRent;
    toast('🏠 租金收入 +¥' + (state._yearlyRent/10000).toFixed(1) + '万');
  }
  // Apply investment returns (simplified: auto-compound)
  // Apply investment returns (annual compound)
  if (state._investments && state._investments.length > 0) {
    for (var ii = 0; ii < state._investments.length; ii++) {
      var inv = state._investments[ii];
      var returns = Math.round(inv.principal * inv.rate);
      state.money += returns;
    }
  }

  // Apply debt interest
  if (state.money < 0) {
    var interest = Math.round(state.money * 0.1); // 10% annual interest on debt
    state.money += interest;
    toast('💳 负债利息扣除 ¥' + (Math.abs(interest)/10000).toFixed(1) + '万');
    state._debtYears = (state._debtYears || 0) + 1;
    if (state._debtYears >= 2) {
      // Force bankruptcy ending
      state.health = 0;
      toast('🏦 连续负债2年，强制破产！');
    }
  } else {
    state._debtYears = 0;
  }

  // Team bonus for management branch
  if (state._teamBonus > 0) { state.money += state._teamBonus; }
}

function switchTrack(newTrack) {
  if (newTrack === state.track) return;
  if (state._switchCount >= 2) { toast('🚫 本局已跳槽' + state._switchCount + '次，已达上限'); return; }
  if (state.year - state._lastSwitchYear < 3) { toast('🚫 跳槽冷却中，需间隔3年'); return; }
  
  var oldName = CAREER_TRACKS[state.track].label;
  var newName = CAREER_TRACKS[newTrack].label;
  
  // Apply penalties
  state.skill = clamp(state.skill - 10, 0, 100);
  state.network = clamp(state.network - 15, 0, 100);
  state.health = clamp(state.health - 5, 0, 100);
  state.hair = clamp(state.hair - 10, 0, 100);
  
  // Reset career position
  state.track = newTrack;
  state.salary = CAREER_TRACKS[newTrack].salary;
  state.rankIdx = 0;
  
  // Update switch tracking
  state._switchCount++;
  state._lastSwitchYear = state.year;
  
  closeAllModals();
  toast('🔄 从' + oldName + '跳槽到' + newName + '！起薪重置');
  checkAchievements();
  render();
}

function checkAchievements() {

    for (var i = 0; i < ACHIEVEMENTS.length; i++) {

          saved[a.id] = { date: Date.now() };
          toast('🏆 成就解锁：' + a.name);

      } catch(e) {}

    localStorage.setItem('parallel_offer_achievements', JSON.stringify(saved));
  } catch(e) {}
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function buildPKCardHtml(rival, me) {
  var myScore = me.skill + me.network + me.health + me.hair;
  var rvScore = rival.skill + rival.network + rival.health + rival.hair;
  var myWin = myScore > rvScore;
  var tie = myScore === rvScore;

  var rivalName = rival.name || '挑战者';

  function row(emoji, label, rv, me) {
    var rvWin = rv > me;
    var meWin = me > rv;
    return '<div class="pk-row">' +
      '<div class="pk-side"><span class="pk-val ' + (rvWin ? 'pk-win' : '') + '">' + rv + '</span></div>' +
      '<div class="pk-vs">' + emoji + '</div>' +
      '<div class="pk-side"><span class="pk-val ' + (meWin ? 'pk-win' : '') + '">' + me + '</span></div>' +
      '</div>' +
      '<div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.4);margin:-4px 0 8px">' + label + '</div>';
  }

  var resultText = tie ? '🤝 平局！你俩棋逢对手' :
    (myWin ? '🎉 你赢了！' + rivalName + '被你碾压' : '😤 你输了！' + rivalName + '更胜一筹');

  var html = '<div class="pk-card">';
  html += '<div class="pk-title">⚔️ ' + rivalName + ' VS 你</div>';
  html += '<div style="display:flex;justify-content:space-between;padding:0 8px;margin-bottom:12px">';
  html += '<div style="font-size:12px;color:var(--text-muted);text-align:center">👤 ' + rivalName + '</div>';
  html += '<div style="font-size:12px;color:var(--text-muted);text-align:center">👤 我</div>';
  html += '</div>';
  html += row('🧠', '技能', rival.skill, me.skill);
  html += row('👥', '人脉', rival.network, me.network);
  html += row('❤️', '健康', rival.health, me.health);
  html += row('😊', '发量', rival.hair, me.hair);
  html += '<div class="pk-result"><div class="pk-result-text">' + resultText + '</div></div>';
  html += '<div class="pk-subtitle">你和 ' + rivalName + ' 的十年对比 ↑</div>'; html += '<div style="text-align:center;margin-top:12px"><button onclick="shareChallenge()" style="background:linear-gradient(135deg,#f97316,#ea580c);border:none;color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(249,115,22,0.3)">📤 邀请好友对比</button></div>';
  html += '</div>';
  return html;
}

function renderHospital() {
  var main = document.getElementById('mainContent');
  var days = Math.max(0, state.year - state._hospitalYear);
  var html = '<div class="scenario-card" style="border-left:4px solid #ef4444">';
  html += '<span class="year-badge" style="background:linear-gradient(135deg,#ef4444,#dc2626)">🏥 住院中</span>';
  html += '<span class="track-tag ' + CAREER_TRACKS[state.track].tag + '">' + CAREER_TRACKS[state.track].emoji + ' 第' + state.year + '年</span>';
  html += '<div class="scenario-title">🏥 你躺在病床上</div>';
  html += '<div class="scene-text">住院第' + (days + 1) + '天。你望着天花板，听着隔壁床的呼嚓声，思考人生。';
  if (state.health <= 0) {
    html += '<br><br>⚠️ <strong>病情严重</strong>，需要治疗费用才能恢复。';
    if (state.money >= 30000) html += '<br>你的存款足够支付医疗费。';
    else if (state.money >= 10000) html += '<br>你的存款可以支付基础治疗。';
    else html += '<br>你的存款不足以支付治疗费用...<br>只能硬抗了。';
  }
  html += '</div>';
  var evtIdx = Math.abs(days) % HOSPITAL_EVENTS.length;
  var evt = HOSPITAL_EVENTS[evtIdx] || HOSPITAL_EVENTS[0];
  html += '<div style="margin-top:12px;padding:12px;background:#fff5f5;border-radius:12px;border:1px solid #fecaca">';
  html += '<div style="font-weight:600;margin-bottom:6px;color:#dc2626">' + evt.title + '</div>';
  html += '<div style="font-size:13px;color:#64748b;line-height:1.6">' + evt.desc + '</div>';
  html += '</div>';
  html += '<div class="choices">';
  if (state.health <= 0) {
    if (state.money >= 30000) {
      html += '<button class="choice-btn safe" onclick="hospitalAction(\'buy_heal\')">💊 买进口药治疗（¥30000）</button>';
      html += '<button class="choice-btn safe" onclick="hospitalAction(\'buy_basic\')">💊 基础治疗（¥10000）</button>';
    } else if (state.money >= 10000) {
      html += '<button class="choice-btn safe" onclick="hospitalAction(\'buy_basic\')">💊 基础治疗（¥10000）</button>';
    }
    html += '<button class="choice-btn safe" onclick="hospitalAction(\'endure\')">😰 硬抗...（免费，随机恢复）</button>';
  } else {
    for (var hi = 0; hi < evt.opts.length; hi++) {
      var hopt = evt.opts[hi];
      html += '<button class="choice-btn safe" onclick="hospitalAction(\'evt_' + hi + '\')">' + hopt.text;
      var effs = [];
      var _hc = (hopt.skill||0)+(hopt.network||0); if(_hc) effs.push((_hc>0?'+':'') + _hc + '🎪');
      var _hh = (hopt.health||0)+(hopt.hair||0); if(_hh) effs.push((_hh>0?'+':'') + _hh + '😊');
      if (hopt.money) effs.push((hopt.money>0?'+':'') + hopt.money + '💰');
      if (effs.length) html += '<div class="choice-effect">' + effs.join(' ') + '</div>';
      html += '</button>';
    }
    html += '<button class="choice-btn safe" onclick="hospitalAction(\'wait\')">💤 躺着不动，等自然恢复</button>';
  }
  html += '</div></div>';
  html += '<div style="margin:12px 16px;padding:12px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">';

  html += '<span>发量: ' + state.hair + '/100</span>';
  html += '</div></div>';

function hospitalAction(action) {
  if (!debounce('hospital', 400)) return;
  var days = state.year - state._hospitalYear;
  if (action === 'buy_heal') { state.money -= 30000; state.hair = clamp(state.hair + 25, 0, 100); toast('💊 进口药效果显著！'); }
  else if (action === 'buy_basic') { state.money -= 10000; state.hair = clamp(state.hair + 10, 0, 100); toast('💊 基础治疗完成'); }
  else if (action === 'endure') { var r = randInt(3, 12); state.hair = clamp(state.hair + r, 0, 100); toast('😰 硬抗了...发量+' + r, r >= 8 ? 'success' : 'warning'); }
  else if (action === 'wait') { state.hair = clamp(state.hair + randInt(2, 8), 0, 100); toast('💤 躺了一天...'); }
  else if (action.startsWith('evt_')) {
    var oi = parseInt(action.replace('evt_', ''));
    var evt = HOSPITAL_EVENTS[days % HOSPITAL_EVENTS.length];
    var o = evt && evt.opts ? evt.opts[oi] : null;
    if (o) {
      if (o.health) state.hair = clamp(state.hair + o.health, 0, 100);
      if (o.hair) state.hair = clamp(state.hair + o.hair, 0, 100);
      if (o.money) state.money += o.money;
      if (o.skill) state.skill = clamp(state.skill + o.skill, 0, 100);
      if (o.network) state.skill = clamp(state.skill + o.network, 0, 100);
    }
  }
  state.year++;
  if (state.year > 10) { state._playEnded = true; showEnding(); return; }
  if (state.health > 20 && Math.random() < 0.4) { state._isHospitalized = false; toast('🎉 你出院了！'); render(); return; }
  applyYearlyEffects();
  render();
}

// ====== P0: Year Review Overlay ======
function showYearReview(event, opt, before) {
  // Calculate deltas
  var changes = [];
  // Merged stats for year review
  var charmBefore = 0, charmAfter = 0, hairB = 0, hairA = 0;
  try { charmBefore = Math.round(((before.skill||0)+(before.network||0))/2); charmAfter = getCharm(); } catch(e) {}
  try { hairB = Math.round(((before.health||0)+(before.hair||0))/2); hairA = getHairDisplay(); } catch(e) {}
  var charmDelta = charmAfter - charmBefore;
  var hairDelta = hairA - hairB;
  if (charmDelta !== 0) changes.push({emoji:'🎪', label:'整活力', before:charmBefore, after:charmAfter, delta:charmDelta});
  if (hairDelta !== 0) changes.push({emoji:'😊', label:'发量', before:hairB, after:hairA, delta:hairDelta});
  if (opt.money) {
    var md = state.money - before.money;
    changes.push({emoji:'💰', label:'存款', before:before.money, after:state.money, delta:md});
  }
  if (opt.salary) {
    var sd = state.salary - before.salary;
    changes.push({emoji:'📈', label:'月薪', before:before.salary, after:state.salary, delta:sd});
  }
  // Show annual net income (always)
  var _annualIncome = Math.round(state.salary * 12);
  var _annualExpense = Math.round((state.expense || 5000) * 12);
  var _netIncome = _annualIncome - _annualExpense;
  changes.push({emoji:'💵', label:'年净收入', before:0, after:_netIncome, delta:_netIncome, isIncome:true});

  // Build changes HTML
  var changesHtml = '';
  for (var c = 0; c < changes.length; c++) {
    var ch = changes[c];
    var cls = ch.delta > 0 ? 'delta-pos' : 'delta-neg';
    var sign = ch.delta > 0 ? '+' : '';
    var bLabel = ch.before >= 10000 ? Math.round(ch.before/10000)+'万' : ch.before;
    var aLabel = ch.after >= 10000 ? Math.round(ch.after/10000)+'万' : ch.after;
    if (ch.isIncome) {
      changesHtml += '<div class="yr-change"><span class="emoji">'+ch.emoji+'</span><span class="label">年净收入(工资-开销)</span><span class="'+cls+'">'+sign+ch.delta.toLocaleString()+'</span></div>';
    } else {
      changesHtml += '<div class="yr-change"><span class="emoji">'+ch.emoji+'</span><span class="val">'+bLabel+'→'+aLabel+'</span><span class="'+cls+'">'+sign+ch.delta+'</span></div>';
    }
  }
  if (changes.length === 0) changesHtml = '<div class="yr-change"><span class="emoji">✨</span><span class="label">平稳度过这一年</span></div>';

  // Ranking (simple heuristic based on total score)
  var totalScore = getCharm() + getHairDisplay() + Math.min(state.rankIdx*15,90);
  var rank = totalScore > 250 ? '前10%' : totalScore > 200 ? '前30%' : totalScore > 150 ? '中游' : '后30%';
  var rankEmoji = totalScore > 250 ? '🏆' : totalScore > 200 ? '📈' : totalScore > 150 ? '➡️' : '📉';

  var html = '<div class="year-review-overlay" id="yearReviewOverlay">';
  html += '<div class="year-review-card">';
  html += '<div class="yr-title">第' + state.year + '年回顾</div>';
  html += '<div class="yr-subtitle">' + CAREER_TRACKS[state.track].emoji + ' ' + CAREER_TRACKS[state.track].label + ' · ' + CAREER_TRACKS[state.track].ladderShort[state.rankIdx] + '</div>';
  html += '<div class="yr-event"><em>' + event.title + '</em></div>';
  html += '<div class="yr-choice">▸ ' + opt.text + '</div>';
  html += '<div class="yr-changes">' + changesHtml + '</div>';
  html += '<div style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:16px">' + rankEmoji + ' 同龄人排名：' + rank + '</div>';
  html += '<button class="yr-continue" onclick="closeYearReview()">下一年 →</button>';
  html += '</div></div>';

  var overlay = document.createElement('div');
  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  // P0.2: Floating numbers
  spawnFloatingNumbers(changes);
}

function closeYearReview() {
  var ov = document.getElementById('yearReviewOverlay');
  if (ov && ov.parentElement) ov.parentElement.remove();

  // === Annual income: salary * 12 - expense * 12 ===
  var annualIncome = Math.round(state.salary * 12);
  var annualExpense = Math.round((state.expense || 5000) * 12);
  var netIncome = annualIncome - annualExpense;
  state.money += netIncome;

  // Talent expense modifiers
  if (state.talents && state.talents.indexOf('socialite') >= 0) { state.money -= 5000; }
  if (state.talents && state.talents.indexOf('big_spender') >= 0) { state.money -= Math.round(state.salary * 0.5); }

  // Clamp money
  if (state.money < -50000) state.money = -50000;

  // Maybe trigger random event
  if (Math.random() < 0.35 && state.year <= 9) {
    state.year++;
    showRandomEvent();
    return;
  }

  state.year++;
  render();
}

// ====== P0.2: Floating Value Animation ======
function spawnFloatingNumbers(changes) {
  var emojis = {skill:'🧠', network:'👥', health:'❤️', hair:'😊', money:'💰', salary:'📈'};
  for (var i = 0; i < changes.length; i++) {
    (function(idx) {
      setTimeout(function() {
        var ch = changes[idx];
        var el = document.createElement('div');
        el.className = 'float-number ' + (ch.delta > 0 ? 'pos' : 'neg');
        var sign = ch.delta > 0 ? '+' : '';
        el.textContent = ch.emoji + ' ' + sign + ch.delta;
        el.style.left = (20 + Math.random() * 60) + '%';
        el.style.top = (30 + Math.random() * 30) + '%';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1300);
      }, idx * 150);
    })(i);
  }
}

    ],
    mnc:[
      {text:'升Partner，成为公司最年轻的合伙人', salary:20, health:-10, skill:8},
      {text:'回国加入一家独角兽做VP', salary:15, network:8, hair:5},
      {text:'裸辞去环游世界', money:-50000, hair:15, health:10}
    ],
    startup:[
      {text:'公司上市敲钟，财务自由！', money:500000, hair:20, skill:5},
      {text:'被收购，拿钱走人再创一个', money:200000, skill:10, network:5},
      {text:'转型做天使投资人，投下一个风口', money:-100000, network:15, hair:8}
    ],
    gig:[
      {text:'工作室做大，接了几个百万级项目', money:300000, network:10, hair:10},
      {text:'转型做自由撰稿人，出了一本畅销书', money:50000, skill:15, hair:12},
      {text:'回老家开个咖啡馆，过慢生活', money:-80000, hair:15, health:10}
    ]
  };

  var opts = finales[state.track] || finales.tech;
  for (var f = 0; f < opts.length; f++) {
    var fo = opts[f];
    html += '<button class="choice-btn ' + ['safe','risky','dangerous'][f] + '" onclick="chooseFinale(' + f + ')" id="finaleOpt' + f + '">';
    html += fo.text;
    html += '</button>';
  }
  html += '</div></div>';
  main.innerHTML = html;

  // Store finale options
  window._finaleOptions = opts;
}

function chooseFinale(idx) {
  var opt = window._finaleOptions[idx];
  if (!opt) return;
  // Apply finale effects
  if (opt.skill) state.skill = clamp(state.skill + opt.skill, 0, 100);
  if (opt.network) state.skill = clamp(state.skill + opt.network, 0, 100);
  if (opt.health) state.hair = clamp(state.hair + opt.health, 0, 100);
  if (opt.hair) state.hair = clamp(state.hair + opt.hair, 0, 100);
  if (opt.money) state.money += opt.money;
  if (opt.salary) state.salary = Math.round(state.salary * (1 + opt.salary * 0.1));
  state.year = 11;
  showEnding();
}


// ====== P3: Track played check ======
function isTrackPlayed(track) {
  var played = localStorage.getItem('parallel_offer_history');
  if (!played) return false;
  try { return JSON.parse(played).indexOf(track) >= 0; } catch(e) { return false; }
}

// ====== Save/Load Export/Import ======
function exportSave() {
  var saveData = {
    version: 1,
    endings: {},
    achievements: {},
    history: [],
    exportTime: new Date().toISOString()
  };
  try { saveData.endings = JSON.parse(localStorage.getItem('parallel_offer_endings') || '{}'); } catch(e) {}
  try { saveData.achievements = JSON.parse(localStorage.getItem('parallel_offer_achievements') || '{}'); } catch(e) {}
  try { saveData.history = JSON.parse(localStorage.getItem('parallel_offer_history') || '[]'); } catch(e) {}
  var json = JSON.stringify(saveData, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'parallel_offer_save_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\ud83d\udcbe \u5b58\u6863\u5df2\u5bfc\u51fa\uff01');
}

function importSave() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.version) { toast('\u274c \u65e0\u6548\u7684\u5b58\u6863\u6587\u4ef6'); return; }
        if (data.endings) localStorage.setItem('parallel_offer_endings', JSON.stringify(data.endings));
        if (data.achievements) localStorage.setItem('parallel_offer_achievements', JSON.stringify(data.achievements));
        if (data.history) localStorage.setItem('parallel_offer_history', JSON.stringify(data.history));
        var endCount = data.endings ? Object.keys(data.endings).length : 0;
        var achCount = data.achievements ? Object.keys(data.achievements).length : 0;
        toast('\u2705 \u5b58\u6863\u5bfc\u5165\u6210\u529f\uff01\u7ed3\u5c40' + endCount + '\u4e2a\uff0c\u6210\u5c31' + achCount + '\u4e2a');
      } catch(ex) {
        toast('\u274c \u5b58\u6863\u6587\u4ef6\u683c\u5f0f\u9519\u8bef');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetSave() {
  if (!confirm('\u786e\u5b9a\u8981\u6e05\u9664\u6240\u6709\u5b58\u6863\u5417\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\uff01')) return;
  localStorage.removeItem('parallel_offer_endings');
  localStorage.removeItem('parallel_offer_achievements');
  localStorage.removeItem('parallel_offer_history');
  toast('\ud83d\uddd1\ufe0f \u5b58\u6863\u5df2\u6e05\u9664');
}

function loadDarkMode() {
  try {

      document.body.classList.add('dark-mode');

}
