<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>平行offer · 职场天赋RPG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf6f0; color: #2c2416; max-width: 420px; margin: 0 auto;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ====== Top Bar ====== */
  .top-bar {
    position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #e8e0d5; padding: 10px 16px;
    font-size: 13px; color: #8c7b64;
  }
  .top-bar .main-row { display: flex; justify-content: space-between; align-items: center; }
  .top-bar .year-label { background: #f0e9db; padding: 4px 12px; border-radius: 12px; font-size: 13px; color: #8c7b64; }
  .top-bar .track-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
  .track-badge.tech { background: #e8f0fe; color: #1a56db; }
  .track-badge.biz { background: #fff3e0; color: #e65100; }
  .track-badge.state { background: #fce4ec; color: #c62828; }
  .track-badge.mnc { background: #e8f5e9; color: #2e7d32; }
  .track-badge.startup { background: #f3e5f5; color: #6a1b9a; }
  .track-badge.gig { background: #e3f2fd; color: #0d47a1; }

  /* ====== Attribute Bars ====== */
  .attr-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:4px 8px; margin-top:8px; }
  .attr-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .attr-item .attr-top { display:flex; align-items:center; gap:3px; }
  .attr-item .attr-icon { font-size:14px; }
  .attr-item .attr-label { font-size:10px; color:#8c7b64; letter-spacing:0.5px; }
  .attr-item .attr-val { font-weight:700; font-size:14px; color:#3d3226; line-height:1.2; }
  .attr-item .attr-bar-bg { width:100%; height:4px; background:#e8e0d5; border-radius:2px; overflow:hidden; margin-top:2px; }
  .attr-item .attr-bar-fill { height:100%; border-radius:2px; transition:width 0.4s; }
  .attr-bar-fill.salary { background:#e65100; }
  .attr-bar-fill.skill { background:#1a56db; }
  .attr-bar-fill.network { background:#6a1b9a; }
  .attr-bar-fill.health { background:#c62828; }
  .attr-bar-fill.satisfaction { background:#2e7d32; }

  /* ====== Main Content ====== */
  .main-content { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .scenario-card { background: linear-gradient(180deg,#fff 0%,#fdfaf6 100%); border-radius: 16px; padding: 22px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .scenario-card .year-badge { display: inline-block; background: #f5efe3; color: #8c7b64; font-size: 12px; padding: 3px 10px; border-radius: 8px; margin-bottom: 10px; }
  .scenario-card .scene-text { font-size: 15px; line-height: 1.75; color: #3d3226; }
  .scenario-card .track-tag { display:inline-block; margin-bottom:8px; padding:4px 12px; border-radius:12px; font-size:11px; font-weight:600; }

  /* ====== Choices ====== */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: linear-gradient(135deg,#fff 0%,#fdfaf5 100%); border: 1.5px solid #e0d6c4; border-radius: 12px;
    padding: 14px 16px; font-size: 14px; line-height: 1.5; color: #3d3226;
    text-align: left; cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent; min-height: 44px;
  }
  .choice-btn:active { background: #f5efe3; border-color: #c9b896; transform: scale(0.98); }
  .choice-btn.selected { background: linear-gradient(135deg,#faf3e8,#f5e8d0); border-color: #b8913c; border-width: 2px; }
  .choice-effect { font-size:11px; color:#b0a590; margin-top:4px; }

  .confirm-btn {
    width: 100%; background: linear-gradient(135deg,#c9a55a,#b8860b); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; box-shadow: 0 3px 12px rgba(184,134,11,0.25);
  }
  .confirm-btn:active { transform: scale(0.97); }
  .confirm-btn:disabled { background: linear-gradient(135deg,#d8d0c4,#c9ba9e); box-shadow: none; cursor: not-allowed; }

  .restart-link { text-align: center; margin: 4px 0; }
  .restart-link button { background: none; border: none; color: #b0a590; font-size: 13px; cursor: pointer; padding: 6px 12px; border-radius: 8px; }
  .restart-link button:active { background: #f5efe3; color: #8c7b64; }

  /* ====== Setup Screens ====== */
  .setup-section { padding: 4px 0; }
  .setup-header { text-align: center; margin-bottom: 20px; }
  .setup-title { font-size: 26px; font-weight: 800; color: #2c2416; }
  .setup-subtitle { font-size: 14px; color: #8c7b64; margin-top: 6px; }

  /* Career track selection */
  .track-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .track-card {
    background: #fff; border: 1.5px solid #e0d6c4; border-radius: 14px;
    padding: 16px 12px; cursor: pointer; transition: all 0.2s;
    text-align: center; min-height: 80px; display: flex; flex-direction: column; justify-content: center;
  }
  .track-card:active { background: #f5efe3; transform: scale(0.98); }
  .track-card.selected { border-color: #b8913c; background: #faf3e3; box-shadow: 0 0 0 2px rgba(184,145,60,0.15); }
  .track-card .tc-emoji { font-size: 28px; margin-bottom: 4px; }
  .track-card .tc-label { font-size: 14px; font-weight: 600; color: #3d3226; }
  .track-card .tc-desc { font-size: 11px; color: #b0a392; margin-top: 3px; }
  .track-card .tc-ladder { font-size: 10px; color: #c9ba9e; margin-top: 6px; line-height: 1.4; }

  /* Persona selection */
  .persona-section { }
  .persona-header { text-align: center; margin-bottom: 16px; }
  .persona-title { font-size: 20px; font-weight: 800; color: #2c2416; }
  .persona-subtitle { font-size: 13px; color: #8c7b64; margin-top: 4px; }
  .persona-dim { margin-bottom: 16px; }
  .persona-dim-label { font-size: 15px; font-weight: 700; color: #3d3226; margin-bottom: 4px; }
  .persona-dim-desc { font-size: 12px; color: #b0a590; margin-bottom: 8px; }
  .persona-options { display: flex; gap: 8px; }
  .persona-card {
    flex: 1; padding: 12px 8px; border: 1.5px solid #e0d6c4; border-radius: 12px;
    background: #fff; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .persona-card:active { background: #f5efe3; transform: scale(0.97); }
  .persona-card.selected { border-color: #b8913c; background: #faf3e3; box-shadow: 0 0 0 2px rgba(184,145,60,0.15); }
  .persona-card-label { font-size: 13px; font-weight: 600; color: #3d3226; }
  .persona-card-desc { font-size: 11px; color: #b0a392; margin-top: 3px; }

  /* ====== Talent Draw ====== */
  .talent-section { }
  .talent-header { text-align: center; margin-bottom: 16px; }
  .talent-title { font-size: 20px; font-weight: 800; color: #2c2416; }
  .talent-subtitle { font-size: 13px; color: #8c7b64; margin-top: 4px; }
  .talent-grid { display: flex; flex-direction: column; gap: 10px; }
  .talent-card {
    background: linear-gradient(135deg,#fffdf8 0%,#faf3e3 100%); border: 2px solid #e4dbcd; border-radius: 14px;
    padding: 16px; cursor: pointer; transition: all 0.2s; display: flex; gap: 14px; align-items: center;
  }
  .talent-card:active { transform: scale(0.98); }
  .talent-card.selected { border-color: #b8913c; box-shadow: 0 0 0 3px rgba(184,145,60,0.15); background: linear-gradient(135deg,#faf3e3,#f5e8d0); }
  .talent-card .tc-emoji { font-size: 32px; flex-shrink: 0; }
  .talent-card .tc-info { flex: 1; }
  .talent-card .tc-name { font-size: 15px; font-weight: 700; color: #3d3226; }
  .talent-card .tc-desc { font-size: 12px; color: #8c7b64; margin-top: 3px; line-height: 1.4; }
  .talent-card .tc-tag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:8px; margin-top:4px; }
  .talent-card .tc-tag.work { background:#e8f0fe; color:#1a56db; }
  .talent-card .tc-tag.life { background:#e8f5e9; color:#2e7d32; }
  .talent-card .tc-tag.special { background:#f3e5f5; color:#6a1b9a; }
  .talent-hint { text-align:center; font-size:12px; color:#b0a590; margin-top:8px; }

  .setup-back { display: block; text-align: center; margin-top: 12px; }
  .setup-back button { background: none; border: none; color: #b0a590; font-size: 13px; cursor: pointer; padding: 6px 12px; border-radius: 8px; }

  /* ====== Promotion Challenge ====== */
  .promo-card { border-left: 3px solid #ff6b35; }
  .promo-badge { display:inline-block; background:linear-gradient(135deg,#ff6b35,#ff8a50); color:#fff; padding:4px 14px; border-radius:12px; font-size:12px; font-weight:600; margin-bottom:10px; }

  /* ====== Identity Card (Ending) ====== */
  .id-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%); border-radius: 20px; padding: 28px 20px 20px; text-align: center; color: #fff; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(15,52,96,0.35); animation: cardAppear 0.5s ease-out 0.3s both; }
  .id-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: rgba(255,255,255,0.04); border-radius: 50%; }
  .id-card-badge { display: inline-block; background: rgba(255,255,255,0.15); padding: 4px 14px; border-radius: 20px; font-size: 12px; color: rgba(255,255,255,0.85); margin-bottom: 16px; letter-spacing: 1px; }
  .id-card-emoji { font-size: 64px; margin-bottom: 6px; }
  .id-card-ending { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .id-card-desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 16px; line-height: 1.5; }
  .id-dims { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .id-dim { display: flex; align-items: center; gap: 10px; }
  .id-dim-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .id-dim-text { text-align: left; flex: 1; }
  .id-dim-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .id-dim-desc { font-size: 11px; color: rgba(255,255,255,0.5); }
  .id-talents { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .id-talent { background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 10px; font-size: 12px; }
  .id-share-hint { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 12px; }

  @keyframes cardAppear { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  /* ====== Ending Color Themes ====== */
  .id-card.theme-gold { background: linear-gradient(135deg, #5b2c0f 0%, #7b3f1c 40%, #c6a45a 100%); }
  .id-card.theme-blue { background: linear-gradient(135deg, #1b3a4b 0%, #14486b 40%, #2c7da0 100%); }
  .id-card.theme-green { background: linear-gradient(135deg, #2d4a22 0%, #3d6b2e 40%, #8bb84e 100%); }
  .id-card.theme-purple { background: linear-gradient(135deg, #2a1a3d 0%, #4a2e6b 40%, #8b5fc4 100%); }
  .id-card.theme-red { background: linear-gradient(135deg, #4a1a1a 0%, #6b2e2e 40%, #c45050 100%); }
  .id-card.theme-gray { background: linear-gradient(135deg, #2d2d2d 0%, #4a4a4a 40%, #7a8a6a 100%); }

  /* ====== Modals ====== */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:350; justify-content:center; align-items:center; padding:16px; }
  .modal-overlay.show { display:flex; }
  .modal-inner { background:#fff; border-radius:20px; width:100%; max-width:400px; max-height:85vh; overflow-y:auto; padding:24px 16px; position:relative; animation:modalIn 0.25s ease-out; }
  /* ====== PK Card ====== */
  .pk-card { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); border-radius:20px; padding:24px 16px; color:#fff; margin-bottom:12px; animation:cardAppear 0.5s ease-out; }
  .pk-title { text-align:center; font-size:15px; font-weight:800; margin-bottom:16px; letter-spacing:2px; }
  .pk-row { display:flex; align-items:center; margin-bottom:10px; }
  .pk-label { width:52px; text-align:center; font-size:18px; flex-shrink:0; }
  .pk-side { flex:1; text-align:center; }
  .pk-val { font-size:22px; font-weight:800; }
  .pk-vs { width:36px; text-align:center; font-size:11px; color:rgba(255,255,255,0.5); font-weight:700; flex-shrink:0; }
  .pk-win { color:#ffd700; }
  .pk-lose { color:rgba(255,255,255,0.4); }
  .pk-result { text-align:center; margin-top:12px; padding:10px; background:rgba(255,255,255,0.08); border-radius:12px; }
  .pk-result-text { font-size:14px; font-weight:700; }
  .pk-subtitle { text-align:center; font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  .modal-title { font-size:20px; font-weight:800; color:#2c2416; text-align:center; margin-bottom:4px; }
  .modal-sub { font-size:13px; color:#8c7b64; text-align:center; margin-bottom:16px; }
  .modal-close { position:absolute; top:12px; right:14px; background:none; border:none; font-size:20px; cursor:pointer; color:#8c7b64; padding:4px 8px; border-radius:8px; }
  .modal-close:active { background:#f5efe3; }

  /* Gallery */
  .gallery-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .gallery-item { background:#faf8f4; border:1.5px solid #e4dbcd; border-radius:14px; padding:14px 8px; text-align:center; min-height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .gallery-item.unlocked { border-color:#c9a96e; background:linear-gradient(135deg,#fffdf8,#faf3e3); }
  .gallery-item.locked { opacity:0.5; filter:grayscale(0.6); }
  .gallery-item .g-emoji { font-size:32px; margin-bottom:4px; }
  .gallery-item .g-name { font-size:13px; font-weight:700; color:#3d3226; }
  .gallery-item .g-track { font-size:10px; color:#b0a590; margin-top:2px; }
  .gallery-count { text-align:center; margin-top:12px; font-size:12px; color:#8c7b64; }

  /* Achievements */
  .achieve-list { display:flex; flex-direction:column; gap:8px; }
  .achieve-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; border:1.5px solid #e4dbcd; background:#faf8f4; }
  .achieve-item.unlocked { border-color:#c9a96e; background:linear-gradient(135deg,#fffdf8,#faf3e3); }
  .achieve-item.locked { opacity:0.5; }
  .achieve-item .a-emoji { font-size:24px; flex-shrink:0; }
  .achieve-item.locked .a-emoji { filter:grayscale(1); opacity:0.4; }
  .achieve-item .a-text { flex:1; }
  .achieve-item .a-name { font-size:14px; font-weight:700; color:#3d3226; }
  .achieve-item .a-desc { font-size:11px; color:#8c7b64; margin-top:2px; }
  .achieve-item.locked .a-name { color:#b0a590; }
  .achieve-progress { text-align:center; margin-top:12px; font-size:12px; color:#8c7b64; }

  /* ====== Bottom Entry Buttons ====== */
  .entry-bar { display:flex; gap:8px; }
  .entry-btn { flex:1; padding:12px 8px; border:1.5px solid #e0d6c4; border-radius:12px; background:linear-gradient(135deg,#faf8f4,#f5efe3); font-size:13px; font-weight:600; color:#5c4b2c; cursor:pointer; transition:all 0.15s; text-align:center; }
  .entry-btn:active { background:#f5efe3; border-color:#c9b896; transform:scale(0.97); }

  /* ====== Toast ====== */
  .toast { position:fixed!important; top:24px!important; left:50%!important; transform:translateX(-50%)!important; background:linear-gradient(135deg,#2c2416,#4a3c28)!important; color:#fff!important; padding:12px 24px!important; border-radius:14px!important; font-size:14px!important; z-index:400!important; box-shadow:0 6px 24px rgba(0,0,0,0.18)!important; animation:toastSlide 0.35s ease,toastOut 0.3s ease 2.2s forwards!important; white-space:pre-wrap!important; max-width:90vw!important; text-align:left!important; line-height:1.5!important; }
  @keyframes toastSlide { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

  /* ====== Timeline ====== */
  .timeline-section { background: rgba(255,255,255,0.5); border-radius: 12px; padding: 12px 8px; margin: 8px 0; }

  /* ====== Narrative Summary ====== */
  .narrative-box { background:#fff; border-radius:16px; padding:20px 18px; margin:8px 0; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,0.04); }

  
  /* ====== Regret/Undo Button ====== */
  .undo-bar { text-align:center; margin-top:8px; }
  .undo-btn { background:linear-gradient(135deg,#fff8f0 0%,#fff3e6 100%); border:1.5px solid #d4a574; border-radius:14px; padding:12px 28px; font-size:14px; color:#8b5e3c; cursor:pointer; transition:all 0.15s; font-weight:500; box-shadow:0 2px 8px rgba(180,130,70,0.15); }
  .undo-btn:active { background:#f5efe3; transform:scale(0.97); }
  .undo-btn:hover { background:#fff3e6; box-shadow:0 2px 12px rgba(180,130,70,0.25); }
  /* ====== Talent Effect Label ====== */
  .talent-effect-label { display:inline-block; font-size:11px; padding:3px 10px; border-radius:8px; margin-top:6px; background:#fff8e8; color:#b8860b; border:1px solid #e8dbb8; line-height:1.4; }
  .talent-effect-label .eff-pos { color:#2e7d32; font-weight:600; }
  .talent-effect-label .eff-neg { color:#c62828; font-weight:600; }
  /* ====== Promo Threshold Display ====== */
  .promo-threshold { background:#f5f0e8; border-radius:10px; padding:10px 14px; margin:8px 0; font-size:13px; color:#5c4b2c; }
  .promo-threshold .met { color:#2e7d32; font-weight:600; }
  .promo-threshold .unmet { color:#c62828; font-weight:600; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-bar" id="topBar">
  <div class="main-row">
    <span class="year-label" id="yearLabel">准备开始</span>
  </div>
  <div class="attr-bar" id="attrBar" style="display:none">
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">💰</span><span class="attr-label">月薪</span></div><span class="attr-val" id="attrSalary">5K</span><div class="attr-bar-bg"><div class="attr-bar-fill salary" id="barSalary" style="width:20%"></div></div></div>
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">📊</span><span class="attr-label">职级</span></div><span class="attr-val" id="attrRank">L1</span></div>
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">🧠</span><span class="attr-label">技能</span></div><span class="attr-val" id="attrSkill">30</span><div class="attr-bar-bg"><div class="attr-bar-fill skill" id="barSkill" style="width:30%"></div></div></div>
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">👥</span><span class="attr-label">人脉</span></div><span class="attr-val" id="attrNetwork">20</span><div class="attr-bar-bg"><div class="attr-bar-fill network" id="barNetwork" style="width:20%"></div></div></div>
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">❤️</span><span class="attr-label">健康</span></div><span class="attr-val" id="attrHealth">80</span><div class="attr-bar-bg"><div class="attr-bar-fill health" id="barHealth" style="width:80%"></div></div></div>
    <div class="attr-item"><div class="attr-top"><span class="attr-icon">😊</span><span class="attr-label">满足</span></div><span class="attr-val" id="attrHappy">60</span><div class="attr-bar-bg"><div class="attr-bar-fill satisfaction" id="barHappy" style="width:60%"></div></div></div>
  </div>
</div>

<div class="main-content" id="mainContent"></div>

<!-- Gallery Modal -->
<div class="modal-overlay" id="galleryModal" onclick="if(event.target===this)closeGallery()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeGallery()">✕</button>
    <div class="modal-title">📖 结局图鉴</div>
    <div class="modal-sub">收集所有平行宇宙的结局</div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="gallery-count" id="galleryCount"></div>
  </div>
</div>

<!-- Achievement Modal -->
<div class="modal-overlay" id="achieveModal" onclick="if(event.target===this)closeAchievements()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeAchievements()">✕</button>

window.onerror = function(msg, url, line) {
  window.__lastError = msg + ' (line ' + line + ')';

  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:8px;z-index:99999;font-size:12px;text-align:center;';

// ====== Utility ======
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function shuffle(arr) { var a = arr.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

function toast(msg) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if(t.parentNode) t.remove(); }, 2600);
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(function(m) { m.classList.remove('show'); });
}


// ====== Humor/Variant Engine (ported from v12) ======
// Makes every playthrough text feel fresh
function _makeVariantText(base) {
  var r = Math.random();
  if (r < 0.25) return _altOutcome(base);
  if (r < 0.70) return _addHumorSuffix(base);
  return _spiceUpResult(base);
}

function _altOutcome(base) {
  var alts = [
    base + ' 过程比想象中艰难，但你挺过来了。朋友圈发了一条仅自己可见的动态。',
    base + ' 夜里想了很久这是不是最好的选择。第二天醒来，发现也没有那么糟。',
    base + ' 后来你在日记里写道：这是今年最正确的决定。当然也可能是在自我说服。',
    base + ' 唯一的问题是：你的猫对此表示无所谓。',
    base + ' 三年后回头看，这个决定改变了你的轨迹。但当时的你并不知道。',
    base + ' 别人以为你深思熟虑，其实你只是靠直觉赌了一把。赌对了。',
    '你做了一个连自己都没想到的选择。' + base + ' 后来这成了你在酒局上最爱讲的故事。',
    base + ' 同学群里有人酸你"运气好"。你没有解释，因为你知道自己付出了什么。',
    base + ' 代价是熬了' + (2 + Math.floor(Math.random() * 4)) + '个月的夜。黑眼圈是你努力的勋章。',
    base + ' 有人问你怎么做到的。你说"就那样吧"——这比任何长篇大论都让人信服。',
    base + ' 父母在电话里说"早该这样了"。你翻了个白眼但心里暖暖的。',
    base + ' 晚上你躺在床上盯着天花板。不是迷茫，是终于有底气发呆了。',
    base + ' 你在备忘录里记下了这一天。标题是"转折点"，后面跟了三个感叹号。',
    base + ' 打开朋友圈，高中同学在马尔代夫。你默默把手机翻了个面。',
    base + ' 你已经学会了在好消息和坏消息之间保持一种中年人特有的模糊表情。',
  ];
  return alts[Math.floor(Math.random() * alts.length)];
}

function _addHumorSuffix(base) {
  var suffixes = [
    ' 你安慰自己：至少头发还在（大概还有）。',
    ' 打开朋友圈，高中同学在马尔代夫。你默默把手机翻了个面。',
    ' 今天也是元气满满的一天——指元気大伤。',
    ' 你骄傲地在群里发了句"还行吧"。群沉默了。',
    ' 虽然累，但比上个月好一点。比去年好不少。这就是人生。',
    ' 晚上多吃了两碗米饭庆祝。碳水是最诚实的快乐。',
    ' 你意识到：成年人的快乐就是发工资那天余额多了几位数。',
    ' 你把这段经历写进了日记。以后写自传的时候用得上。',
    ' 你给妈妈打了个电话。她说"注意身体"——老妈永远是对的。',
    ' 生活给你的柠檬，你榨成了柠檬汁。虽然有点酸，但解渴。',
    ' 如果这是一部电影，此刻应该有BGM响起。但现实中只有空调的嗡嗡声。',
    ' 你在知乎上搜了一下"如何低调地炫耀"。然后什么都没发。',
    ' 这一年的KPI超额完成。你的KPI是活下来。',
    ' 地铁上你看见一个很像自己的人。他没你混得好——你猜的。',
    ' 你想起刚毕业时的自己。如果那时看到现在的你，应该会觉得"还行"。',
  ];
  return base + suffixes[Math.floor(Math.random() * suffixes.length)];
}

function _spiceUpResult(base) {
  if (Math.random() < 0.5) {
    var prefixes = ['说真的，', '老实讲，', '后来你才明白，', '回头想想，', '不吹不黑，', '你后来跟人说起时总是轻描淡写：', '如果非要总结的话：', '简单说就是，'];
    var pfx = prefixes[Math.floor(Math.random() * prefixes.length)];
    return pfx + base;
  }
  var insertions = [
    '——虽然过程一言难尽——',
    '（此处省略三千字内心戏）',
    '，但你活下来了',
    '。说实话你自己都没想到',
    '。后来你把这个故事讲给新人听，他们觉得你在凡尔赛',
    '。不过这不重要',
    '，当然这是后话',
    '。你发现自己已经对这种事麻木了',
  ];
  var parts = base.split('。');
  if (parts.length >= 2) {
    var insertAt = Math.floor(Math.random() * (parts.length - 1));
    parts[insertAt] += insertions[Math.floor(Math.random() * insertions.length)];
    return parts.join('。');
  }
  return base + insertions[Math.floor(Math.random() * insertions.length)];
}


// ====== Talent Effect Display ======
function _getTalentEffectSummary(talent) {
  if (!talent || !talent.effect) return '';
  var parts = [];
  var e = talent.effect;
  if (e.skillBonus) parts.push('<span class="eff-pos">🧠技能+' + Math.round(e.skillBonus * 100) + '%</span>');
  if (e.skillPenalty) parts.push('<span class="eff-neg">🧠技能' + Math.round(e.skillPenalty * 100) + '%</span>');
  if (e.networkBonus) parts.push('<span class="eff-pos">👥人脉+' + Math.round(e.networkBonus * 100) + '%</span>');
  if (e.networkPenalty) {
    if (typeof e.networkPenalty === 'number' && e.networkPenalty > 1) {
      parts.push('<span class="eff-neg">👥人脉' + e.networkPenalty + '</span>');
    } else {
      parts.push('<span class="eff-neg">👥人脉' + Math.round(e.networkPenalty * 100) + '%</span>');
    }
  }
  if (e.healthPenalty) parts.push('<span class="eff-neg">❤️健康' + e.healthPenalty + '</span>');
  if (e.healthRecovery) parts.push('<span class="eff-pos">❤️恢复+' + Math.round(e.healthRecovery * 100) + '%</span>');
  if (e.healthCap) parts.push('<span class="eff-pos">❤️上限+' + (e.healthCap - 100) + '</span>');
  if (e.happyBonus) parts.push('<span class="eff-pos">😊满足+' + e.happyBonus + '</span>');
  if (e.promoBonus) parts.push('<span class="eff-pos">📈晋升+' + Math.round(e.promoBonus * 100) + '%</span>');
  if (e.promoPenalty) parts.push('<span class="eff-neg">📈晋升' + Math.round(e.promoPenalty * 100) + '%</span>');
  if (e.promoSpeed) {
    if (e.promoSpeed < 0) parts.push('<span class="eff-neg">📈晋升' + Math.round(e.promoSpeed * 100) + '%</span>');
    else parts.push('<span class="eff-pos">📈晋升+' + Math.round(e.promoSpeed * 100) + '%</span>');
  }
  if (e.luckBonus) parts.push('<span class="eff-pos">🍀运气+' + e.luckBonus + '</span>');
  if (e.riskMod) parts.push('<span class="eff-pos">⚡风险收益x' + e.riskMod + '</span>');
  if (e.dramaBonus) parts.push('<span class="eff-pos">🎪文案更搞笑</span>');
  if (e.phoneEvent) parts.push('<span class="eff-pos">📱彩蛋事件+' + e.phoneEvent + '</span>');
  if (e.mentorBonus) parts.push('<span class="eff-pos">🌟贵人+' + Math.round(e.mentorBonus * 100) + '%</span>');
  if (e.compensation) parts.push('<span class="eff-pos">🔄被迫时+' + Math.round(e.compensation * 100) + '%</span>');
  if (e.sidejobBonus) parts.push('<span class="eff-pos">🎨副业+' + Math.round(e.sidejobBonus * 100) + '%</span>');
  if (e.expenseMod) parts.push('<span class="eff-neg">💰消费+' + Math.round(e.expenseMod * 100) + '%</span>');
  return parts.join('  ');
}

// ====== Balance Bar / Top Bar ======
function updateTopBar() {
  var yl = document.getElementById('yearLabel');
  var ab = document.getElementById('attrBar');
  if (state.year === 0) {
    yl.textContent = '准备开始';
    ab.style.display = 'none';
    return;
  }
  ab.style.display = 'flex';
  yl.textContent = '第' + state.year + '年';
  var track = CAREER_TRACKS[state.track];
  var rankLabel = track ? (track.ladderShort[state.rankIdx] || 'L1') : '—';
  document.getElementById('attrSalary').textContent = state.salary >= 10000 ? Math.round(state.salary/10000) + 'W' : state.salary + '';
  document.getElementById('attrRank').textContent = rankLabel;
  document.getElementById('attrSkill').textContent = state.skill;
  document.getElementById('attrNetwork').textContent = state.network;

// ====== Start Game ======
function startGame() {
  var track = CAREER_TRACKS[_selectedTrack];
  if (!track) return;
  state.track = _selectedTrack;
  state.year = 1;
  state.salary = track.salary;
  state.rankIdx = 0;
  state.skill = 30;
  state.network = 20;
  state.health = 80;
  state.happy = 60;
  state.money = 0;
  state.talents = _talentSelections.slice();
  state.persona = Object.assign({}, _personaSelections);
  state._shownEvents = {};
  state._shownRandom = [];
  state._yearlyRecords = [];
  state._playEnded = false;
  state._endingSaved = false;
  state._promoCooldown = 0;
  state._undoSnapshot = null;
  state._lastChoiceType = null;
  state._playStartTime = Date.now();

  // Apply persona bonuses
  var bg = window._personaDims[1].options.find(function(o){ return o.id === _personaSelections.background; });
  var city = window._personaDims[2].options.find(function(o){ return o.id === _personaSelections.city; });
  var pers = window._personaDims[0].options.find(function(o){ return o.id === _personaSelections.personality; });
  if (bg) state.money = bg.startMoney;
  if (city) {
    state.salary = Math.round(state.salary * city.salaryMod);
  }
  if (pers) {
    state.salary = Math.round(state.salary * pers.salaryMod);
    state.skill = Math.round(state.skill * pers.skillMod);
  }

  // Apply talent effects
  for (var i = 0; i < state.talents.length; i++) {
    var talent = TALENT_POOL.find(function(t){ return t.id === state.talents[i]; });
    if (talent && talent.effect) {
      if (talent.effect.healthPenalty) state.health += talent.effect.healthPenalty;
      if (talent.effect.happyBonus) state.happy += talent.effect.happyBonus;
    }
  }
  state.health = clamp(state.health, 0, 100);
  state.happy = clamp(state.happy, 0, 100);

  updateTopBar();
  render();
}

// ====== Render Main Game ======
function render() {
  if (state.year > 10) {
    showEnding();
    return;
  }
  var main = document.getElementById('mainContent');
  updateTopBar();

  // Check for promotion year
  var track = CAREER_TRACKS[state.track];
  var isPromoYear = track.promoYears.indexOf(state.year) >= 0;
  if (isPromoYear && state._promoCooldown <= 0 && state.rankIdx < track.ladder.length - 1) {
    showPromotionChallenge();
    return;
  }
  if (state._promoCooldown > 0) state._promoCooldown--;

  // Normal year - show career scene
  var events = CAREER_EVENTS[state.track] || [];
  var pool = [];
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    if (e.year[0] <= state.year && e.year[1] >= state.year) {
      if (!state._shownEvents[e.title]) pool.push(e);
    }
  }
  if (pool.length === 0) {
    // Fallback: any event from this track not yet shown
    for (var j = 0; j < events.length; j++) {
      if (!state._shownEvents[events[j].title]) pool.push(events[j]);
    }
  }
  if (pool.length === 0) {
    // All shown, reset
    state._shownEvents = {};
    pool = events.slice();
  }
  var event = pick(pool);
  state._shownEvents[event.title] = true;
  window._currentEvent = event;

  // Build choices HTML
  var choicesHtml = '';
  for (var c = 0; c < event.opts.length; c++) {
    var opt = event.opts[c];
    var effectParts = [];
    if (opt.skill) effectParts.push('🧠' + (opt.skill > 0 ? '+' : '') + opt.skill);
    if (opt.network) effectParts.push('👥' + (opt.network > 0 ? '+' : '') + opt.network);
    if (opt.health) effectParts.push('❤️' + (opt.health > 0 ? '+' : '') + opt.health);
    if (opt.happy) effectParts.push('😊' + (opt.happy > 0 ? '+' : '') + opt.happy);
    if (opt.money) effectParts.push('💰' + (opt.money > 0 ? '+' : '') + Math.abs(opt.money));
    choicesHtml += '<button class="choice-btn" onclick="chooseEvent(' + c + ')" id="eventOpt' + c + '">';
    choicesHtml += opt.text;
    if (effectParts.length > 0) {
      choicesHtml += '<div class="choice-effect">' + effectParts.join('  ') + '</div>';
    }
    choicesHtml += '</button>';
  }

  var trackInfo = CAREER_TRACKS[state.track];
  var rankName = trackInfo.ladder[state.rankIdx] || '新人';

  var html = '<div class="scenario-card">';
  html += '<span class="year-badge">第' + state.year + '年</span>';
  html += '<span class="track-tag ' + trackInfo.tag + '">' + trackInfo.emoji + ' ' + rankName + '</span>';
  html += '<div class="scene-text">' + _makeVariantText(event.desc) + '</div>';
  html += '</div>';
  html += '<div class="choices">' + choicesHtml + '</div>';
  html += '<div class="undo-bar"><button class="undo-btn" onclick="undoLastChoice()">↩️ 后悔药 · 撤回重选</button></div>';
  html += '<div class="restart-link"><button onclick="showIntro()">🔄 重新开始</button></div>';

  main.innerHTML = html;
}

function chooseEvent(optIdx) {
  var event = window._currentEvent;
  if (!event) return;
  var opt = event.opts[optIdx];

  // Save snapshot for undo
  state._undoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    happy: state.happy, money: state.money, salary: state.salary,
    rankIdx: state.rankIdx, year: state.year, eventTitle: event.title,
    promoCooldown: state._promoCooldown || 0
  };
  state._lastChoiceType = 'event';

  // Apply effects
  if (opt.skill) state.skill = clamp(state.skill + getModifiedBonus(opt.skill, 'skill'), 0, 100);
  if (opt.network) state.network = clamp(state.network + getModifiedBonus(opt.network, 'network'), 0, 100);
  if (opt.health) state.health = clamp(state.health + getModifiedBonus(opt.health, 'health'), 0, 100);
  if (opt.happy) state.happy = clamp(state.happy + getModifiedBonus(opt.happy, 'happy'), 0, 100);
  if (opt.money) state.money += opt.money;
  if (opt.salary) state.salary = Math.max(0, Math.round(state.salary * (1 + opt.salary * 0.1)));

  // Natural aging
  state.health -= (state.year >= 5 ? 4 : 2);

  // Talent: zen adds happy
  if (state.talents.indexOf('zen') >= 0) state.happy += 5;
  if (state.talents.indexOf('hardwork') >= 0) state.health -= 3;
  if (state.talents.indexOf('nightowl') >= 0) state.health -= 1;
  if (state.talents.indexOf('foodie') >= 0) state.happy += 3;

  state.health = clamp(state.health, 0, 100);
  state.happy = clamp(state.happy, 0, 100);

  // Record year
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    happy: state.happy,
    money: state.money,
    event: event.title
  });
  }

  // Maybe trigger random event
  if (Math.random() < 0.35 && state.year <= 9) {
    showRandomEvent();
    return;
  }

  state.year++;
  render();
}

function getModifiedBonus(base, type) {
  var mod = 1;
  for (var i = 0; i < state.talents.length; i++) {
    var talent = TALENT_POOL.find(function(t){ return t.id === state.talents[i]; });
    if (!talent || !talent.effect) continue;
    if (type === 'skill' && talent.effect.skillBonus) mod += talent.effect.skillBonus;
    if (type === 'skill' && talent.effect.skillPenalty) mod += talent.effect.skillPenalty;
    if (type === 'network' && talent.effect.networkBonus) mod += talent.effect.networkBonus;
    if (type === 'network' && talent.effect.networkPenalty) mod += talent.effect.networkPenalty;
  }
  return Math.round(base * Math.max(0, mod));
}


// ====== Undo/Regret System ======
function undoLastChoice() {
  if (!state._undoSnapshot) { toast('没有可以撤回的选择'); return; }
  var snap = state._undoSnapshot;
  state.skill = snap.skill;
  state.network = snap.network;
  state.health = snap.health;
  state.happy = snap.happy;
  state.money = snap.money;
  state.salary = snap.salary;
  state.rankIdx = snap.rankIdx;
  state.year = snap.year;
  state._promoCooldown = snap.promoCooldown || 0;
  var wasRandom = state._lastChoiceType === 'random';
  // Remove current event from dedup so same event re-appears
  if (snap.eventTitle) {
    if (wasRandom) {
      var idx = state._shownRandom.indexOf(snap.eventTitle);
      if (idx >= 0) state._shownRandom.splice(idx, 1);
    } else {
      delete state._shownEvents[snap.eventTitle];
    }
  }
  state._undoSnapshot = null;
  state._lastChoiceType = null;
  // Re-show the same event
  if (wasRandom) {
    showRandomEvent();
  } else {
    render();
  }
  toast('↩️ 已撤回，重新选择');
}


// ====== Random Event ======
function showRandomEvent() {
  var pool = [];
  for (var i = 0; i < RANDOM_EVENTS.length; i++) {
    if (state._shownRandom.indexOf(RANDOM_EVENTS[i].title) < 0) pool.push(RANDOM_EVENTS[i]);
  }
  if (pool.length === 0) {
    state._shownRandom = [];
    pool = RANDOM_EVENTS.slice();
  }
  // Weighted random
  var totalW = 0;
  for (var j = 0; j < pool.length; j++) totalW += pool[j].weight;
  var r = Math.random() * totalW;
  var cumul = 0;
  var event = pool[0];
  for (var k = 0; k < pool.length; k++) {
    cumul += pool[k].weight;
    if (r <= cumul) { event = pool[k]; break; }
  }
  state._shownRandom.push(event.title);
  window._currentRandomEvent = event;

  var html = '<div class="scenario-card" style="border-left:3px solid #ff6b35">';
  html += '<span class="track-tag" style="background:#ff6b35;color:#fff">🎲 随机事件</span>';
  html += '<div class="scene-text">' + _makeVariantText(event.desc) + '</div></div>';
  html += '<div class="choices">';
  for (var c = 0; c < event.opts.length; c++) {
    var opt = event.opts[c];
    var parts = [];
    if (opt.money) parts.push('💰' + (opt.money > 0 ? '+' : '') + Math.abs(opt.money));
    if (opt.skill) parts.push('🧠' + (opt.skill > 0 ? '+' : '') + opt.skill);
    if (opt.network) parts.push('👥' + (opt.network > 0 ? '+' : '') + opt.network);
    if (opt.health) parts.push('❤️' + (opt.health > 0 ? '+' : '') + opt.health);
    if (opt.happy) parts.push('😊' + (opt.happy > 0 ? '+' : '') + opt.happy);
    html += '<button class="choice-btn" onclick="chooseRandom(' + c + ')" id="randOpt' + c + '">';
    html += opt.text;
    if (parts.length > 0) html += '<div class="choice-effect">' + parts.join('  ') + '</div>';
    html += '</button>';
  }
  html += '</div>';

  html += '\u003cdiv class="undo-bar"\u003e\u003cbutton class="undo-btn" onclick="undoLastChoice()"\u003e\u21a9\ufe0f 后悔药 \u00b7 撤回重选\u003c/button\u003e\u003c/div\u003e';
  document.getElementById('mainContent').innerHTML = html;
}

function chooseRandom(optIdx) {
  var event = window._currentRandomEvent;
  if (!event) return;
  var opt = event.opts[optIdx];

  // Save snapshot for undo
  state._undoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    happy: state.happy, money: state.money, salary: state.salary,
    rankIdx: state.rankIdx, year: state.year, eventTitle: event.title,
    promoCooldown: state._promoCooldown || 0
  };
  state._lastChoiceType = 'random';

  if (opt.money) state.money += opt.money;
  if (opt.skill) state.skill = clamp(state.skill + opt.skill, 0, 100);
  if (opt.network) state.network = clamp(state.network + opt.network, 0, 100);
  if (opt.health) state.health = clamp(state.health + opt.health, 0, 100);
  if (opt.happy) state.happy = clamp(state.happy + opt.happy, 0, 100);

  // Record year for timeline
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    happy: state.happy,
    money: state.money,
    event: event.title + ' (随机)'
  });
  }

  state.year++;
  render();
}

function promoChoice(choice) {
  var track = CAREER_TRACKS[state.track];
  var promoted = false;
  var talentMod = 0;
  for (var i = 0; i < state.talents.length; i++) {
    var t = TALENT_POOL.find(function(tal){ return tal.id === state.talents[i]; });
    if (t && t.effect && t.effect.promoBonus) talentMod += t.effect.promoBonus;
    if (t && t.effect && t.effect.promoPenalty) talentMod += t.effect.promoPenalty;
  }

  if (choice === 0) {
    // Push for promotion: chance based on skill + talent
    var chance = 0.3 + (state.skill / 200) + talentMod;
    if (state.network >= 60) chance += 0.1;
    promoted = Math.random() < chance;
    if (promoted) {
      state.rankIdx = Math.min(state.rankIdx + 1, track.ladder.length - 1);
      state.skill = clamp(state.skill + 10, 0, 100);
      state.health = clamp(state.health - 8, 0, 100);
      state.happy = clamp(state.happy + 10, 0, 100);
      toast('🎉 晋升成功！现在是 ' + track.ladder[state.rankIdx]);
      state.salary = Math.round(state.salary * 1.3);
    } else {
      state.happy = clamp(state.happy - 10, 0, 100);
      state._promoCooldown = 2;
      toast('😔 晋升失败... 冷却2年');
    }
  } else if (choice === 1) {
    // Stay safe: slight skill bonus, no promotion
    state.skill = clamp(state.skill + 3, 0, 100);
    state.health = clamp(state.health + 3, 0, 100);
    state.happy = clamp(state.happy + 2, 0, 100);
    toast('🛡️ 稳住，等待下次机会');
  } else {
    // Job hop: salary boost but rank may reset
    state.salary = Math.round(state.salary * 1.25);
    state.network = clamp(state.network + 10, 0, 100);
    state.happy = clamp(state.happy + 5, 0, 100);
    if (Math.random() < 0.4) {
      state.rankIdx = Math.max(0, state.rankIdx - 1);
      toast('🔄 跳槽了！薪资涨了，但职级重置...');
    } else {
      toast('🔄 跳槽成功！薪资涨了！');
    }
  }

  // Record year for timeline
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    happy: state.happy,
    money: state.money,
    event: '晋升答辩'
  });
  }

  state.year++;
  render();
}

function renderTimeline() {
  var c = document.getElementById('timelineContainer');

  var records = state._yearlyRecords;

  for (var i = 0; i < records.length; i++) {
    var r = records[i];

    html += '<div style="display:flex;flex-direction:column;align-items:center;min-width:60px;position:relative">';
    html += '<div style="width:12px;height:12px;border-radius:50%;background:' + (isLast ? '#b8913c' : '#c9ba9e') + ';border:2px solid #f5f0e8;z-index:2"></div>';

    }
    html += '</div>';
  }
  c.innerHTML = html;
}

// ====== Save/Load ======
function saveEnding(ending) {
  try {
    var saved = JSON.parse(localStorage.getItem('parallel_offer_endings') || '{}');
    saved[ending.id] = { name: ending.name, emoji: ending.emoji, track: state.track, date: Date.now() };
    localStorage.setItem('parallel_offer_endings', JSON.stringify(saved));
  } catch(e) {}
}

function savePlayedTrack() {
  try {
    var record = { track: state.track, year: state.year, salary: state.salary, rankIdx: state.rankIdx, skill: state.skill, network: state.network, health: state.health, happy: state.happy, talents: state.talents };
    var history = JSON.parse(localStorage.getItem('parallel_offer_history') || '[]');
    history.push(record);
    if (history.length > 20) history = history.slice(-20);
    localStorage.setItem('parallel_offer_history', JSON.stringify(history));
  } catch(e) {}
}

function checkAchievements() {
  try {
    var saved = JSON.parse(localStorage.getItem('parallel_offer_achievements') || '{}');
    for (var i = 0; i < ACHIEVEMENTS.length; i++) {
      var a = ACHIEVEMENTS[i];
      try {
        if (a.check(state) && !saved[a.id]) {
          saved[a.id] = { date: Date.now() };
          toast('🏆 成就解锁：' + a.name);
        }
      } catch(e) {}
    }
    localStorage.setItem('parallel_offer_achievements', JSON.stringify(saved));
  } catch(e) {}
}

// ====== Poster ======
function generatePoster() {
  var canvas = document.getElementById('posterCanvas');
  var ctx = canvas.getContext('2d');
  var w = 750, h = 1334;

  // Background
  var grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '600 28px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('平行offer · 职场鉴定报告', w/2, 80);

  // Track
  var track = CAREER_TRACKS[state.track];
  ctx.font = '24px -apple-system, sans-serif';
  ctx.fillText(track.emoji + ' ' + track.label + ' · ' + track.ladder[state.rankIdx], w/2, 130);

  // Talents
  ctx.font = '20px -apple-system, sans-serif';
  var talentStr = state.talents.map(function(id) {
    var t = TALENT_POOL.find(function(tal){ return tal.id === id; });
    return t ? t.emoji + t.name : '';
  }).join('  ');
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(talentStr, w/2, 175);

  // Attrs
  var attrs = [
    { icon:'💰', label:'月薪', value:'¥' + state.salary.toLocaleString() },
    { icon:'📊', label:'职级', value: track.ladder[state.rankIdx] },
    { icon:'🧠', label:'技能', value: state.skill },
    { icon:'👥', label:'人脉', value: state.network },
    { icon:'❤️', label:'健康', value: state.health },
    { icon:'😊', label:'满足度', value: state.happy }
  ];
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(60, 220, w - 120, attrs.length * 60 + 20);

  for (var i = 0; i < attrs.length; i++) {
    var a = attrs[i];
    var y = 260 + i * 60;
    ctx.fillStyle = '#fff';
    ctx.font = '22px -apple-system, sans-serif';
    ctx.fillText(a.icon + ' ' + a.label, 90, y);
    ctx.font = 'bold 22px -apple-system, sans-serif';
    ctx.fillText('' + a.value, 500, y);
    // Bar
    var barVal = typeof a.value === 'number' ? a.value : 50;
    if (a.label === '月薪') barVal = Math.min(100, state.salary / 3000 * 100);
    if (a.label === '职级') barVal = (state.rankIdx + 1) / track.ladder.length * 100;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(90, y + 8, w - 180, 6);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(90, y + 8, (w - 180) * barVal / 100, 6);
  }

  // Ending
  var ending = null;
  for (var j = 0; j < ENDINGS.length; j++) {
    if (ENDINGS[j].track && ENDINGS[j].track !== state.track) continue;
    try { if (ENDINGS[j].condition(state)) { ending = ENDINGS[j]; break; } } catch(e) {}
  }
  if (!ending) ending = ENDINGS[ENDINGS.length - 1];

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px -apple-system, sans-serif';
  ctx.fillText(ending.emoji + ' ' + ending.name, w/2, 700);
  ctx.font = '20px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';

  // Word wrap description
  var words = ending.desc.split('');
  var line = '';
  var lineY = 740;
  for (var k = 0; k < words.length; k++) {
    line += words[k];
    if (ctx.measureText(line).width > 580 || k === words.length - 1) {
      ctx.fillText(line, w/2, lineY);
      line = '';
      lineY += 30;
    }
  }

  // CTA
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '16px -apple-system, sans-serif';
  ctx.fillText('测测你是什么动物？我已经是' + ending.emoji + ending.name + '了', w/2, h - 60);

  // Show poster
  var img = document.getElementById('posterImage');
  img.src = canvas.toDataURL('image/png');
  document.getElementById('posterModal').style.display = 'flex';
  var _pc = document.getElementById('posterCaption'); if (_pc) { _pc.textContent = '📸 测测你是什么职场动物？我已经是' + (ending.emoji||'') + (ending.name||'') + '了'; }
}

function closePosterModal() {
  document.getElementById('posterModal').style.display = 'none';
}


function showPKCard(rival, me) {
  var myScore = me.skill + me.network + me.health + me.happy;
  var rvScore = rival.skill + rival.network + rival.health + rival.happy;
  var myWin = myScore > rvScore;
  var tie = myScore === rvScore;

  var track = CAREER_TRACKS[state.track] || {};
  var meName = track.ladder ? (track.ladder[state.rankIdx] || '职场人') : '职场人';
  var rivalName = rival.name || '挑战者';

  function row(emoji, label, rv, me) {
    var rvWin = rv > me;
    var meWin = me > rv;
    return '<div class="pk-row">' +
      '<div class="pk-side"><span class="pk-val ' + (rvWin ? 'pk-win' : '') + '">' + rv + '</span></div>' +
      '<div class="pk-vs">' + emoji + '</div>' +
      '<div class="pk-side"><span class="pk-val ' + (meWin ? 'pk-win' : '') + '">' + me + '</span></div>' +
      '</div>' +
      '<div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.4);margin:-4px 0 8px">' + label + '</div>';
  }

  var resultText = tie ? '🤝 平局！你俩棋逢对手' :
    (myWin ? '🎉 你赢了！' + rivalName + '被你碾压' : '😤 你输了！' + rivalName + '更胜一筹');

  var html = '<div class="pk-card">';
  html += '<div class="pk-title">⚔️ ' + rivalName + ' VS 你</div>';
  html += '<div style="display:flex;justify-content:space-between;padding:0 8px;margin-bottom:12px">';
  html += '<div style="font-size:12px;color:rgba(255,255,255,0.5);text-align:center">👤 ' + rivalName + '</div>';
  html += '<div style="font-size:12px;color:rgba(255,255,255,0.5);text-align:center">👤 我</div>';
  html += '</div>';
  html += row('🧠', '技能', rival.skill, me.skill);
  html += row('👥', '人脉', rival.network, me.network);
  html += row('❤️', '健康', rival.health, me.health);
  html += row('😊', '满足', rival.happy, me.happy);
  html += '<div class="pk-result"><div class="pk-result-text">' + resultText + '</div></div>';
  html += '</div>';
  html += '<div class="pk-subtitle">你和 ' + rivalName + ' 的十年对比 ↑</div>';

  var main = document.getElementById('mainContent');
  main.innerHTML = html + main.innerHTML;
  updateTopBar();
  window.scrollTo(0, 0);
  return true;
}


function shareChallenge() {
  var ending = state._ending || {};
  var name = ending.name || '社畜';
  var emoji = ending.emoji || '🦥';
  // Encode stats for PK: skill,network,health,happy,salary,emoji,endingName,talents
  var rv = state.skill + ',' + state.network + ',' + state.health + ',' + state.happy + ',' + state.salary + ',' + encodeURIComponent(emoji) + ',' + encodeURIComponent(name) + ',' + state.talents.map(function(t){ return t; }).join('|');
  var baseUrl = window.location.href.split('?')[0];
  var challengeUrl = baseUrl + '?from=' + encodeURIComponent(name) + '&rv=' + encodeURIComponent(rv);
  var text = '📸 我已经是' + emoji + name + '了！\n敢来和我PK吗？\n👉 ' + challengeUrl;
  if (navigator.share) {
    navigator.share({ title: '平行offer · 职场天赋RPG', text: text });
  } else {
    navigator.clipboard.writeText(text).then(function(){
      toast('🔗 挑战链接已复制，发给好友PK吧！');
    }).catch(function(){
      toast('📋 请手动复制链接分享');
    });
  }
}


// ====== INIT ======
showIntro();
</script>
