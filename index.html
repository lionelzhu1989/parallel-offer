  html += '</div></div>';
  html += '<div class="choices">';
  html += '<button class="choice-btn" onclick="promoChoice(0)">';
  html += '🎯 拼一把冲晋升';
  html += '<div class="choice-effect">成功概率 ' + Math.round(chance * 100) + '% · 高风险高回报</div></button>';
  html += '<button class="choice-btn" onclick="promoChoice(1)">';
  html += '🛡️ 稳住别浪';
  html += '<div class="choice-effect">安全但错过机会</div></button>';
  html += '<button class="choice-btn" onclick="promoChoice(2)">';
  html += '🔄 骑驴找马';
  html += '<div class="choice-effect">跳槽涨薪但职级可能重置</div></button>';
  html += '</div>';

  // Threshold + talent breakdown panel
  html += '<div style="text-align:center;margin-top:12px;padding:12px 16px;background:#f5f0e3;border-radius:12px;font-size:13px">';
  html += '<div style="margin-bottom:8px;font-weight:600">📋 晋升门槛 & 加成</div>';
  html += '<div style="margin-bottom:4px">需要 <span style="color:' + (skillMet ? '#2e7d32' : '#c62828') + ';font-weight:600">🧠' + skillReq + '</span>';
  html += ' & <span style="color:' + (networkMet ? '#2e7d32' : '#c62828') + ';font-weight:600">👥' + networkReq + '</span>';
  html += ' <span style="color:#999;font-size:11px">(你: 🧠' + state.skill + ' 👥' + state.network + ')</span></div>';

  if (talentDetails.length > 0) {
    html += '<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #d4c9a8">';
    html += '<span style="color:#6b5b3e">🎭 天赋加成：</span>';
    for (var j = 0; j < talentDetails.length; j++) {
      var td = talentDetails[j];
      html += '<span style="color:' + (td.val > 0 ? '#2e7d32' : '#c62828') + '">' + td.name + ' ' + (td.val > 0 ? '+' : '') + Math.round(td.val * 100) + '%</span>';
      if (j < talentDetails.length - 1) html += ' ';
    }
    html += '</div>';
  }

  html += '<div style="margin-top:8px;padding-top:6px;border-top:1px dashed #d4c9a8;font-weight:600">';
  html += '🎲 晋升概率：<span style="color:#ff6b35;font-size:15px">' + Math.round(chance * 100) + '%</span>';
  html += '</div></div>';

  html += '<div class="undo-bar"><button class="undo-btn" onclick="undoLastChoice()">↩️ 后悔药 · 撤回重选 (' + (state._undoMax - state._undoUsed) + '/' + state._undoMax + ')</button></div>';

function promoChoice(choice) {
  if (!debounce('promo', 400)) return;
  // Save snapshot for undo (fix #7)
  state._undoSnapshot = {
    skill: state.skill, network: state.network, health: state.health,
    hair: state.hair, money: state.money, salary: state.salary,
    rankIdx: state.rankIdx, year: state.year, eventTitle: '晋升答辩',
    promoCooldown: state._promoCooldown || 0
  };
  state._lastChoiceType = 'promo';
  var track = CAREER_TRACKS[state.track];
  var promoted = false;
  var talentMod = 0;
  for (var i = 0; i < state.talents.length; i++) {
    var t = TALENT_POOL.find(function(tal){ return tal.id === state.talents[i]; });
    if (t && t.promoBonus) talentMod += t.promoBonus;
    if (t && t.promoPenalty) talentMod += t.promoPenalty;
  }

  if (choice === 0) {
    // Push for promotion: use pre-calculated threshold-linked chance
    var chance = state._promoChance || 0.3;
    promoted = Math.random() < chance;
    if (promoted) {
      state.rankIdx = Math.min(state.rankIdx + 1, track.ladder.length - 1);
      state.skill = clamp(state.skill + 10, 0, 100);
      state.health = clamp(state.health - 8, 0, 100);
      state.hair = clamp(state.hair + 10, 0, 100);
      toast('🎉 晋升成功！现在是 ' + track.ladder[state.rankIdx]);
      state.salary = Math.round(state.salary * 1.3);
    } else {
      state.hair = clamp(state.hair - 10, 0, 100);
      state._promoCooldown = 2;
      toast('😔 晋升失败');
    // Restore from snapshot on failure
    if (state._prePromoSnapshot) {
      var snap = state._prePromoSnapshot;
      state.skill = snap.skill; state.network = snap.network;
      state.health = snap.health; state.hair = snap.hair;
      state.money = snap.money;
      state._prePromoSnapshot = null;
    }
    }
  } else if (choice === 1) {
    // Stay safe: slight skill bonus, no promotion
    state.skill = clamp(state.skill + 3, 0, 100);
    state.health = clamp(state.health + 3, 0, 100);
    state.hair = clamp(state.hair + 2, 0, 100);
    toast('🛡️ 稳住，等待下次机会');
  } else {
    // Job hop: salary boost but rank may reset
    state.salary = Math.round(state.salary * 1.25);
    state.network = clamp(state.network + 10, 0, 100);
    state.hair = clamp(state.hair + 5, 0, 100);
    if (Math.random() < 0.4) {
      state.rankIdx = Math.max(0, state.rankIdx - 1);
      toast('🔄 跳槽了！薪资涨了，但职级重置...');
    } else {
      toast('🔄 跳槽成功！薪资涨了！');
    }
  }

  // Record year for timeline
  if (!state._yearlyRecords.find(function(r){ return r.year === state.year; })) {
    state._yearlyRecords.push({
    year: state.year,
    salary: state.salary,
    rank: CAREER_TRACKS[state.track].ladderShort[state.rankIdx],
    skill: state.skill,
    network: state.network,
    health: state.health,
    hair: state.hair,
    money: state.money,
    event: '晋升答辩'
  });
  }

    applyYearlyEffects();
  applyBuffs();
  applyYearlyIncome();
  state.year++;
  render();
}

function renderTimeline() {
  var c = document.getElementById('tlTrack');
  if (!c || !state._yearlyRecords || state._yearlyRecords.length === 0) return;
  var records = state._yearlyRecords;
  var maxMoney = 0;
  for (var i = 0; i < records.length; i++) { if (records[i].money > maxMoney) maxMoney = records[i].money; }
  if (maxMoney <= 0) maxMoney = 100000;

  var html = '';
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var prev = i > 0 ? records[i-1] : null;

    // Determine dot style
    var dotCls = 'tl-dot';
    if (r.event && (r.event.indexOf('晋升') >= 0 || r.event.indexOf('升职') >= 0 || r.event.indexOf('主管') >= 0 || r.event.indexOf('总监') >= 0 || r.event.indexOf('VP') >= 0)) dotCls += ' promo';
    else if (r.event && (r.event.indexOf('裁员') >= 0 || r.event.indexOf('辞职') >= 0 || r.event.indexOf('离职') >= 0 || r.event.indexOf('创业') >= 0)) dotCls += ' fire';
    else if (r.event && (r.event.indexOf('结婚') >= 0 || r.event.indexOf('买房') >= 0 || r.event.indexOf('财务') >= 0 || r.event.indexOf('百万') >= 0)) dotCls += ' gold';

    html += '<div class="tl-year">';
    html += '<div class="' + dotCls + '"></div>';
    html += '<div class="tl-content">';
    html += '<div class="tl-year-row"><span class="tl-year-label">第' + r.year + '年</span>';
    html += '<span class="tl-event">' + (r.event || '平稳度过') + '</span>';
    html += '<span class="tl-rank">' + r.rank + '</span></div>';

    // Stat changes as compact pills
    html += '<div class="tl-stats">';
    if (prev) {
      var diffs = [
        ['🧠', r.skill - prev.skill], ['👥', r.network - prev.network],
        ['\u2764\uFE0F', r.health - prev.health], ['😊', r.hair - prev.hair]
      ];
      for (var d = 0; d < diffs.length; d++) {
        if (diffs[d][1] !== 0) {
          var cls = diffs[d][1] > 0 ? 'pos' : 'neg';
          var sign = diffs[d][1] > 0 ? '+' : '';
          html += '<span class="tl-stat"><span class="' + cls + '">' + diffs[d][0] + sign + diffs[d][1] + '</span></span>';
        }
      }
    }
    var mc = r.money < 0 ? '#ef4444' : r.money >= 200000 ? '#10b981' : r.money >= 50000 ? '#f59e0b' : '';
    var ms = r.money >= 10000 ? (r.money/10000).toFixed(1) + 'w' : r.money.toLocaleString();
    html += '<span class="tl-stat" style="' + (mc ? 'color:'+mc+';font-weight:700' : '') + '">\uD83D\uDCB0' + ms + '</span>';
    html += '</div></div></div>';
  }

  c.innerHTML = html;
}

// ====== Buff/Debuff System ======
function addBuff(id, name, desc, duration, effects) {
  // effects: {skill:0, network:0, health:0, hair:0, salary:0, money:0} per year
  // Remove existing buff with same id
  state._buffs = state._buffs.filter(function(b) { return b.id !== id; });
  state._buffs.push({id:id, name:name, desc:desc, remaining:duration, effects:effects});
}

function applyBuffs() {
  // Called yearly - apply all active buff effects and decrement duration
  var expired = [];
  for (var i = state._buffs.length - 1; i >= 0; i--) {
    var b = state._buffs[i];
    var e = b.effects;
    if (e.skill) state.skill = clamp(state.skill + e.skill, 0, 100);
    if (e.network) state.network = clamp(state.network + e.network, 0, 100);
    if (e.health) state.health = clamp(state.health + e.health, 0, 100);
    if (e.hair) state.hair = clamp(state.hair + e.hair, 0, 100);
    if (e.salary) state.salary = Math.max(0, state.salary + e.salary);
    if (e.money) state.money += e.money;
    b.remaining--;
    if (b.remaining <= 0) expired.push(b.name);
  }
  state._buffs = state._buffs.filter(function(b) { return b.remaining > 0; });
  if (expired.length > 0) toast('📋 ' + expired.join('、') + ' 效果结束');
}

function getBuffDesc() {
  if (state._buffs.length === 0) return '';
  var html = '';
  for (var i = 0; i < state._buffs.length; i++) {
    var b = state._buffs[i];
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px">⏱ ' + b.name + ' (' + b.remaining + '年)</div>';
  }
  return html;
}

function buyInvest(cost, rate) {
  if (!debounce('shop', 300)) return;

  state.money -= cost;
  var rateMap = {0.03:'定期存款', 0.08:'基金定投', 0.15:'股票炒股'};
  var invName = rateMap[rate] || '理财';
  state._investments.push({principal:cost, rate:rate, name:invName, year:state.year});
  toast('✅ 已投入 ' + (cost/10000).toFixed(0) + '万，年化' + (rate*100).toFixed(0) + '%，每年自动复利');
  closeAllModals();
  render();
}

function sellInvest(idx) {
  if (!debounce('shop', 300)) return;
  if (!state._investments || idx >= state._investments.length) return;
  var inv = state._investments[idx];
  // Calculate years held
  var yearsHeld = Math.max(1, state.year - inv.year);
  // Penalty: lose 10% of principal if sold early (within 3 years)
  var penalty = yearsHeld < 3 ? 0.1 : 0;
  var returnMoney = Math.round(inv.principal * (1 - penalty));
  state.money += returnMoney;
  state._investments.splice(idx, 1);
  if (penalty > 0) {
    toast('💸 赎回' + inv.name + '，持有' + yearsHeld + '年，手续费' + (penalty*100) + '%，到账¥' + (returnMoney/10000).toFixed(1) + '万');
  } else {
    toast('✅ 赎回' + inv.name + '，持有' + yearsHeld + '年，全额到账¥' + (returnMoney/10000).toFixed(1) + '万');
  }
  closeAllModals();
  render();
}

function buyProperty(cost, rent) {
  if (!debounce('shop', 300)) return;
  if (state.money < cost) { toast('💸 存款不足，需¥' + (cost/10000) + '万'); return; }
  state.money -= cost;
  state._property = (state._property || 0) + 1;
  state._yearlyRent = (state._yearlyRent || 0) + rent;
  toast('🏠 购房成功！每年租金+¥' + (rent/10000).toFixed(1) + '万');
  closeAllModals();
  render();
}

function applyYearlyIncome() {
  // Apply rental income
  if (state._yearlyRent > 0) {
    state.money += state._yearlyRent;
    toast('🏠 租金收入 +¥' + (state._yearlyRent/10000).toFixed(1) + '万');
  }
  // Apply investment returns (simplified: auto-compound)
  // Apply investment returns (annual compound)
  if (state._investments && state._investments.length > 0) {
    for (var ii = 0; ii < state._investments.length; ii++) {
      var inv = state._investments[ii];
      var returns = Math.round(inv.principal * inv.rate);
      state.money += returns;
    }
  }

  // Apply debt interest
  if (state.money < 0) {
    var interest = Math.round(state.money * 0.1); // 10% annual interest on debt
    state.money += interest;
    toast('💳 负债利息扣除 ¥' + (Math.abs(interest)/10000).toFixed(1) + '万');
    state._debtYears = (state._debtYears || 0) + 1;
    if (state._debtYears >= 2) {
      // Force bankruptcy ending
      state.health = 0;
      toast('🏦 连续负债2年，强制破产！');
    }
  } else {
    state._debtYears = 0;
  }

  // Team bonus for management branch
  if (state._teamBonus > 0) { state.money += state._teamBonus; }
}

function switchTrack(newTrack) {
  if (newTrack === state.track) return;
  if (state._switchCount >= 2) { toast('🚫 本局已跳槽' + state._switchCount + '次，已达上限'); return; }
  if (state.year - state._lastSwitchYear < 3) { toast('🚫 跳槽冷却中，需间隔3年'); return; }
  
  var oldName = CAREER_TRACKS[state.track].label;
  var newName = CAREER_TRACKS[newTrack].label;
  
  // Apply penalties
  state.skill = clamp(state.skill - 10, 0, 100);
  state.network = clamp(state.network - 15, 0, 100);
  state.health = clamp(state.health - 5, 0, 100);
  state.hair = clamp(state.hair - 10, 0, 100);
  
  // Reset career position
  state.track = newTrack;
  state.salary = CAREER_TRACKS[newTrack].salary;
  state.rankIdx = 0;
  
  // Update switch tracking
  state._switchCount++;
  state._lastSwitchYear = state.year;
  
  closeAllModals();
  toast('🔄 从' + oldName + '跳槽到' + newName + '！起薪重置');
  checkAchievements();
  render();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

  var myScore = me.skill + me.network + me.health + me.hair;
  var rvScore = rival.skill + rival.network + rival.health + rival.hair;
  var myWin = myScore > rvScore;
  var tie = myScore === rvScore;

  var rivalName = rival.name || '挑战者';

  function row(emoji, label, rv, me) {
    var rvWin = rv > me;
    var meWin = me > rv;
    return '<div class="pk-row">' +
      '<div class="pk-side"><span class="pk-val ' + (rvWin ? 'pk-win' : '') + '">' + rv + '</span></div>' +
      '<div class="pk-vs">' + emoji + '</div>' +
      '<div class="pk-side"><span class="pk-val ' + (meWin ? 'pk-win' : '') + '">' + me + '</span></div>' +
      '</div>' +
      '<div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.4);margin:-4px 0 8px">' + label + '</div>';
  }

  var resultText = tie ? '🤝 平局！你俩棋逢对手' :
    (myWin ? '🎉 你赢了！' + rivalName + '被你碾压' : '😤 你输了！' + rivalName + '更胜一筹');

  var html = '<div class="pk-card">';
  html += '<div class="pk-title">⚔️ ' + rivalName + ' VS 你</div>';
  html += '<div style="display:flex;justify-content:space-between;padding:0 8px;margin-bottom:12px">';
  html += '<div style="font-size:12px;color:var(--text-muted);text-align:center">👤 ' + rivalName + '</div>';
  html += '<div style="font-size:12px;color:var(--text-muted);text-align:center">👤 我</div>';
  html += '</div>';
  html += row('🧠', '技能', rival.skill, me.skill);
  html += row('👥', '人脉', rival.network, me.network);
  html += row('❤️', '健康', rival.health, me.health);
  html += row('😊', '发量', rival.hair, me.hair);
  html += '<div class="pk-result"><div class="pk-result-text">' + resultText + '</div></div>';
  html += '<div class="pk-subtitle">你和 ' + rivalName + ' 的十年对比 ↑</div>'; html += '<div style="text-align:center;margin-top:12px"><button onclick="shareChallenge()" style="background:linear-gradient(135deg,#f97316,#ea580c);border:none;color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(249,115,22,0.3)">📤 邀请好友对比</button></div>';
  html += '</div>';
  return html;
}

function hospitalAction(action) {
  if (!debounce('hospital', 400)) return;
  var days = state.year - state._hospitalYear;
  if (action === 'buy_heal') { state.money -= 30000; state.hair = clamp(state.hair + 25, 0, 100); toast('💊 进口药效果显著！'); }
  else if (action === 'buy_basic') { state.money -= 10000; state.hair = clamp(state.hair + 10, 0, 100); toast('💊 基础治疗完成'); }
  else if (action === 'endure') { var r = randInt(3, 12); state.hair = clamp(state.hair + r, 0, 100); toast('😰 硬抗了...发量+' + r, r >= 8 ? 'success' : 'warning'); }
  else if (action === 'wait') { state.hair = clamp(state.hair + randInt(2, 8), 0, 100); toast('💤 躺了一天...'); }
  else if (action.startsWith('evt_')) {
    var oi = parseInt(action.replace('evt_', ''));
    var evt = HOSPITAL_EVENTS[days % HOSPITAL_EVENTS.length];
    var o = evt && evt.opts ? evt.opts[oi] : null;
    if (o) {
      if (o.health) state.hair = clamp(state.hair + o.health, 0, 100);
      if (o.hair) state.hair = clamp(state.hair + o.hair, 0, 100);
      if (o.money) state.money += o.money;
      if (o.skill) state.skill = clamp(state.skill + o.skill, 0, 100);
      if (o.network) state.skill = clamp(state.skill + o.network, 0, 100);
    }
  }
  state.year++;
  if (state.year > 10) { state._playEnded = true; showEnding(); return; }
  if (state.health > 20 && Math.random() < 0.4) { state._isHospitalized = false; toast('🎉 你出院了！'); render(); return; }
  applyYearlyEffects();
  render();
}

function showYearReview(event, opt, before) {
  // Calculate deltas
  var changes = [];
  // Merged stats for year review
  var charmBefore = 0, charmAfter = 0, hairB = 0, hairA = 0;
  try { charmBefore = Math.round(((before.skill||0)+(before.network||0))/2); charmAfter = getCharm(); } catch(e) {}
  try { hairB = Math.round(((before.health||0)+(before.hair||0))/2); hairA = getHairDisplay(); } catch(e) {}
  var charmDelta = charmAfter - charmBefore;
  var hairDelta = hairA - hairB;
  if (charmDelta !== 0) changes.push({emoji:'🎪', label:'整活力', before:charmBefore, after:charmAfter, delta:charmDelta});
  if (hairDelta !== 0) changes.push({emoji:'😊', label:'发量', before:hairB, after:hairA, delta:hairDelta});
  if (opt.money) {
    var md = state.money - before.money;
    changes.push({emoji:'💰', label:'存款', before:before.money, after:state.money, delta:md});
  }
  if (opt.salary) {
    var sd = state.salary - before.salary;
    changes.push({emoji:'📈', label:'月薪', before:before.salary, after:state.salary, delta:sd});
  }
  // Show annual net income (always)
  var _annualIncome = Math.round(state.salary * 12);
  var _annualExpense = Math.round((state.expense || 5000) * 12);
  var _netIncome = _annualIncome - _annualExpense;
  changes.push({emoji:'💵', label:'年净收入', before:0, after:_netIncome, delta:_netIncome, isIncome:true});

  // Build changes HTML
  var changesHtml = '';
  for (var c = 0; c < changes.length; c++) {
    var ch = changes[c];
    var cls = ch.delta > 0 ? 'delta-pos' : 'delta-neg';
    var sign = ch.delta > 0 ? '+' : '';
    var bLabel = ch.before >= 10000 ? Math.round(ch.before/10000)+'万' : ch.before;
    var aLabel = ch.after >= 10000 ? Math.round(ch.after/10000)+'万' : ch.after;
    if (ch.isIncome) {
      changesHtml += '<div class="yr-change"><span class="emoji">'+ch.emoji+'</span><span class="label">年净收入(工资-开销)</span><span class="'+cls+'">'+sign+ch.delta.toLocaleString()+'</span></div>';
    } else {
      changesHtml += '<div class="yr-change"><span class="emoji">'+ch.emoji+'</span><span class="val">'+bLabel+'→'+aLabel+'</span><span class="'+cls+'">'+sign+ch.delta+'</span></div>';
    }
  }
  if (changes.length === 0) changesHtml = '<div class="yr-change"><span class="emoji">✨</span><span class="label">平稳度过这一年</span></div>';

  // Ranking (simple heuristic based on total score)
  var totalScore = getCharm() + getHairDisplay() + Math.min(state.rankIdx*15,90);
  var rank = totalScore > 250 ? '前10%' : totalScore > 200 ? '前30%' : totalScore > 150 ? '中游' : '后30%';
  var rankEmoji = totalScore > 250 ? '🏆' : totalScore > 200 ? '📈' : totalScore > 150 ? '➡️' : '📉';

  var html = '<div class="year-review-overlay" id="yearReviewOverlay">';
  html += '<div class="year-review-card">';
  html += '<div class="yr-title">第' + state.year + '年回顾</div>';
  html += '<div class="yr-subtitle">' + CAREER_TRACKS[state.track].emoji + ' ' + CAREER_TRACKS[state.track].label + ' · ' + CAREER_TRACKS[state.track].ladderShort[state.rankIdx] + '</div>';
  html += '<div class="yr-event"><em>' + event.title + '</em></div>';
  html += '<div class="yr-choice">▸ ' + opt.text + '</div>';
  html += '<div class="yr-changes">' + changesHtml + '</div>';
  html += '<div style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:16px">' + rankEmoji + ' 同龄人排名：' + rank + '</div>';
  html += '<button class="yr-continue" onclick="closeYearReview()">下一年 →</button>';
  html += '</div></div>';

  var overlay = document.createElement('div');
  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  // P0.2: Floating numbers
  spawnFloatingNumbers(changes);
}

function closeYearReview() {
  var ov = document.getElementById('yearReviewOverlay');
  if (ov && ov.parentElement) ov.parentElement.remove();

  // === Annual income: salary * 12 - expense * 12 ===
  var annualIncome = Math.round(state.salary * 12);
  var annualExpense = Math.round((state.expense || 5000) * 12);
  var netIncome = annualIncome - annualExpense;
  state.money += netIncome;

  // Talent expense modifiers
  if (state.talents && state.talents.indexOf('socialite') >= 0) { state.money -= 5000; }
  if (state.talents && state.talents.indexOf('big_spender') >= 0) { state.money -= Math.round(state.salary * 0.5); }

  // Clamp money
  if (state.money < -50000) state.money = -50000;

  // Maybe trigger random event
  if (Math.random() < 0.35 && state.year <= 9) {
    state.year++;
    showRandomEvent();
    return;
  }

  state.year++;
  render();
}

// ====== P0.2: Floating Value Animation ======
function spawnFloatingNumbers(changes) {
  var emojis = {skill:'🧠', network:'👥', health:'❤️', hair:'😊', money:'💰', salary:'📈'};
  for (var i = 0; i < changes.length; i++) {
    (function(idx) {
      setTimeout(function() {
        var ch = changes[idx];
        var el = document.createElement('div');
        el.className = 'float-number ' + (ch.delta > 0 ? 'pos' : 'neg');
        var sign = ch.delta > 0 ? '+' : '';
        el.textContent = ch.emoji + ' ' + sign + ch.delta;
        el.style.left = (20 + Math.random() * 60) + '%';
        el.style.top = (30 + Math.random() * 30) + '%';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1300);
      }, idx * 150);
    })(i);
  }
}

// ====== Save/Load Export/Import ======
function exportSave() {
  var saveData = {
    version: 1,
    endings: {},
    achievements: {},
    history: [],
    exportTime: new Date().toISOString()
  };
  try { saveData.endings = JSON.parse(localStorage.getItem('parallel_offer_endings') || '{}'); } catch(e) {}
  try { saveData.achievements = JSON.parse(localStorage.getItem('parallel_offer_achievements') || '{}'); } catch(e) {}
  try { saveData.history = JSON.parse(localStorage.getItem('parallel_offer_history') || '[]'); } catch(e) {}
  var json = JSON.stringify(saveData, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'parallel_offer_save_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\ud83d\udcbe \u5b58\u6863\u5df2\u5bfc\u51fa\uff01');
}

function importSave() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.version) { toast('\u274c \u65e0\u6548\u7684\u5b58\u6863\u6587\u4ef6'); return; }
        if (data.endings) localStorage.setItem('parallel_offer_endings', JSON.stringify(data.endings));
        if (data.achievements) localStorage.setItem('parallel_offer_achievements', JSON.stringify(data.achievements));
        if (data.history) localStorage.setItem('parallel_offer_history', JSON.stringify(data.history));
        var endCount = data.endings ? Object.keys(data.endings).length : 0;
        var achCount = data.achievements ? Object.keys(data.achievements).length : 0;
        toast('\u2705 \u5b58\u6863\u5bfc\u5165\u6210\u529f\uff01\u7ed3\u5c40' + endCount + '\u4e2a\uff0c\u6210\u5c31' + achCount + '\u4e2a');
      } catch(ex) {
        toast('\u274c \u5b58\u6863\u6587\u4ef6\u683c\u5f0f\u9519\u8bef');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetSave() {
  if (!confirm('\u786e\u5b9a\u8981\u6e05\u9664\u6240\u6709\u5b58\u6863\u5417\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\uff01')) return;
  localStorage.removeItem('parallel_offer_endings');
  localStorage.removeItem('parallel_offer_achievements');
  localStorage.removeItem('parallel_offer_history');
  toast('\ud83d\uddd1\ufe0f \u5b58\u6863\u5df2\u6e05\u9664');
}

  html += '<div style="margin-bottom:8px">🏆 <strong>收集结局</strong>：10+种结局等你解锁，看看你会走到哪一步</div>';
  html += '</div>';
  html += '<button onclick="localStorage.setItem(\'parallel_offer_guide\',\'1\');this.parentElement.parentElement.remove()" style="width:100%;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;color:#fff;padding:12px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer">开始游戏 →</button>';
  html += '</div>';
  
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}


function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  var isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('parallel_offer_darkmode', isDark ? '1' : '0');
  toast(isDark ? '🌙 夜间模式已开启' : '☀️ 日间模式已开启');
}

function loadDarkMode() {
  try {
    if (localStorage.getItem('parallel_offer_darkmode') === '1') {
      document.body.classList.add('dark-mode');
    }
  } catch(e) {}
}


// ====== Initialize ======
loadDarkMode();
render();

</script>
